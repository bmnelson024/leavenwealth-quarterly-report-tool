.cover{background:var(--dark);border-left:none;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 60px;}
.cover .eyebrow{color:rgba(255,255,255,0.55);font-size:13px;letter-spacing:4px;text-transform:uppercase;font-family:sans-serif;margin-bottom:20px;}
.cover h1{color:white;font-size:56px;font-weight:700;margin-bottom:10px;font-family:sans-serif;font-variant-numeric:lining-nums;font-feature-settings:"lnum";}
.cover .quarter{color:var(--teal);font-size:26px;font-weight:400;letter-spacing:3px;margin-bottom:36px;font-family:sans-serif;}
.cover .divider{width:60px;height:3px;background:var(--teal);margin:0 auto 30px;}
.sh{background:var(--dark);color:white;padding:10px 18px;font-family:sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;}
.sh2{font-family:sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);font-weight:700;margin:18px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.pn{font-family:sans-serif;font-size:11px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.st{width:100%;border-collapse:collapse;margin-bottom:22px;font-family:sans-serif;font-size:13px;}
.st th{background:var(--dark);color:white;padding:9px 14px;text-align:left;font-weight:500;letter-spacing:1px;font-size:11px;}
.st td{padding:9px 14px;border-bottom:1px solid var(--border);}
.st tr:nth-child(even) td{background:var(--teal-light);}
.pos{color:#c0392b;font-weight:600;}.neg{color:#1a8a6e;font-weight:600;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.sc{border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center;}
.sc .sl{font-family:sans-serif;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.sc .sv{font-family:sans-serif;font-size:20px;font-weight:700;color:var(--dark);}
.sc.hl{background:var(--dark);border-color:var(--dark);}.sc.hl .sl{color:var(--teal);}.sc.hl .sv{color:white;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.cb{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--teal-light);}
.ct{font-family:sans-serif;font-size:9px;color:var(--dark);text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:7px 11px;background:white;border-bottom:1px solid var(--border);}
.cb .np{height:145px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:sans-serif;font-size:12px;}
.cb img{width:100%;height:auto;display:block;}
.lg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.lc{background:var(--teal-light);border-radius:8px;padding:11px 12px;text-align:center;font-family:sans-serif;}
.ll{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.lv{font-size:18px;font-weight:700;color:var(--dark);}
.loan-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.loan-tile{background:var(--teal-light);border-radius:8px;padding:14px 16px;font-family:sans-serif;}
.loan-tile h3{font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.loan-inner{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ll2{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.lv2{font-size:17px;font-weight:700;color:var(--dark);}
.ns{margin-bottom:0;padding:13px 0;border-bottom:1px solid var(--border);}.ns:last-of-type{border-bottom:none;}
.nl{font-family:sans-serif;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.nt{font-size:13px;line-height:1.75;}
.fn{font-family:sans-serif;font-size:10px;color:var(--muted);line-height:1.9;border-top:1px solid var(--border);padding-top:14px;}
.pgn{position:absolute;bottom:24px;right:52px;font-family:sans-serif;font-size:10px;color:var(--muted);}
.footer-logo{position:absolute;bottom:12px;right:100px;height:48px;width:auto;opacity:0.75;}
.footer-prop{position:absolute;bottom:28px;left:52px;font-family:sans-serif;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
@media print{@page{margin:0;}*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}body{background:white;}.page{margin:0;box-shadow:none;page-break-after:always;break-after:page;}.page:last-child{page-break-after:auto;}img{box-shadow:none;}}
</style></head><body>
<!-- PAGE 1: COVER -->
<div class="page cover">
  <img src="${LOGO_FULL}" alt="LeavenWealth" style="height:60px;width:auto;margin-bottom:28px;filter:brightness(0) invert(1);"/>
  <div class="eyebrow">Investor Report</div>
  <div class="quarter">${qtr.replace(/Q(\d)/i,"Q$1").replace(/\s*(\d{4})/," · $1")}</div>
  <div class="divider"></div>
  <h1>${inv}</h1>
  ${n_photos>0?photoStrip:`<div style="margin-top:20px;font-family:sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">${propNamesHtml}</div>`}
  ${n_photos>0?`<div style="margin-top:16px;font-family:sans-serif;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;">${propNamesHtml}</div>`:""}
</div>
<!-- PAGE 2: SUMMARY — narratives + QoQ comparison -->
${(()=>{
  const summaryOverflow = (n.income.length + n.expenses.length + (n.capex||"").length + n.outlook.length) > 1200 || n.outlook.length > 500;
  const prevQtrLabel=calcPrevQuarterLabel(qtr)||"Prior Quarter";
  const tbl=`<table class="st"><thead><tr><th>Metric</th><th>${prevQtrLabel}</th><th>${qtr}</th><th>Change</th></tr></thead><tbody>
    <tr><td>Total Income</td><td>${prev?fmtWhole(prev.totalIncome):"—"}</td><td>${fmtWhole(m.totalIncome)}</td><td class="${prev&&m.totalIncome>=prev.totalIncome?"neg":"pos"}">${fmtChg(m.totalIncome,prev?.totalIncome??null)}</td></tr>
    <tr><td>Total Expenses</td><td>${prev?fmtWhole(prev.totalExpense):"—"}</td><td>${fmtWhole(m.totalExpense)}</td><td class="${prev&&m.totalExpense<=prev.totalExpense?"neg":"pos"}">${fmtChg(m.totalExpense,prev?.totalExpense??null)}</td></tr>
    <tr><td>Net Operating Income</td><td>${prev?fmtWhole(prev.noi):"—"}</td><td>${fmtWhole(m.noi)}</td><td class="${prev&&m.noi>=prev.noi?"neg":"pos"}">${fmtChg(m.noi,prev?.noi??null)}</td></tr>
    <tr><td>Avg Physical Occupancy</td><td>${prev?prev.occupancy+"%":"—"}</td><td>${m.occupancy}%</td><td class="${prev&&m.occupancy>=prev.occupancy?"neg":"pos"}">${fmtOccChg(m.occupancy,prev?.occupancy??null)}</td></tr>
    <tr><td>Total Delinquency</td><td>${prev&&prev.delinquency!=null?fmtWhole(prev.delinquency):"—"}</td><td>${fmtWhole(m.delinquency)}</td><td class="${prev&&m.delinquency<=prev.delinquency?"neg":"pos"}">${prev?.delinquency!=null?fmtChg(m.delinquency,prev.delinquency):"—"}</td></tr>
    ${m.capex?`<tr><td>Capital Expenditures</td><td>${prev&&prev.capex!=null?fmtWhole(prev.capex):"—"}</td><td>${fmtWhole(m.capex)}</td><td class="${prev&&prev.capex!=null&&m.capex<=prev.capex?"neg":"pos"}">${prev?.capex!=null?fmtChg(m.capex,prev.capex):"—"}</td></tr>`:""}
  </tbody></table>`;
  const page2=`<div class="page">
  <div class="pn">${inv}</div><div class="sh">Summary — ${qtr}</div>
  ${tbl}
  <div class="ns"><div class="nl">Income &amp; Occupancy</div><p class="nt">${escapeHtml(n.income).replace(/\n/g,'<br>')}</p></div>
  <div class="ns"><div class="nl">Expenses</div><p class="nt">${escapeHtml(n.expenses).replace(/\n/g,'<br>')}</p></div>
  ${n.capex?`<div class="ns"><div class="nl">Capital Expenditures</div><p class="nt">${escapeHtml(n.capex).replace(/\n/g,'<br>')}</p></div>`:""}
  ${!summaryOverflow?`<div class="ns"><div class="nl">Outlook</div><p class="nt">${escapeHtml(n.outlook).replace(/\n/g,'<br>')}</p></div>`:""}
  <div class="footer-prop">${inv}</div><img src="${LOGO_SYMBOL}" class="footer-logo"/><div class="pgn">${pg.v()}</div>
</div>`;
  const page2b=summaryOverflow?`
<!-- PAGE 2b: SUMMARY CONTINUED — outlook -->
<div class="page">
  <div class="pn">${inv}</div><div class="sh">Summary — ${qtr} <span style="font-size:11px;font-weight:400;letter-spacing:1px;opacity:0.7">(continued)</span></div>
  <div class="ns"><div class="nl">Outlook</div><p class="nt">${escapeHtml(n.outlook).replace(/\n/g,'<br>')}</p></div>
  <div class="footer-prop">${inv}</div><img src="${LOGO_SYMBOL}" class="footer-logo"/><div class="pgn">${pg.v()}</div>
</div>`:"";
  return page2+page2b;
})()}
${(()=>{
  if(!/bg\s*champion/i.test(invName||'')) return '';
  const bgc=state.bgChampionCustom||{};
  const commentary=(bgc.commentary||'').trim();
  const charts=Array.isArray(bgc.charts)?bgc.charts:[];
  if(!commentary && charts.length===0) return '';
  // Preserve the user's line breaks (numbered lists, paragraphs, etc.)
  const commentaryHtml=escapeHtml(commentary).replace(/\n/g,'<br>');
  const pages=[];
  // First page: commentary + first 2 charts
  const firstCharts=charts.slice(0,2);
  pages.push(`<div class="page">
  <div class="pn">${inv}</div><div class="sh">Additional Commentary — ${qtr}</div>
  ${commentary?`<div class="ns"><p class="nt">${commentaryHtml}</p></div>`:''}
  ${firstCharts.map((src,i)=>`<div style="margin-bottom:16px;page-break-inside:avoid;break-inside:avoid"><img src="${src}" alt="Chart ${i+1}" style="width:100%;height:auto;display:block;border-radius:6px;border:1px solid #c8e6de;"/></div>`).join('')}
  <div class="footer-prop">${inv}</div><img src="${LOGO_SYMBOL}" class="footer-logo"/><div class="pgn">${pg.v()}</div>
</div>`);
  // Remaining charts, 2 per page
  for(let i=2;i<charts.length;i+=2){
    const pair=charts.slice(i,i+2);
    pages.push(`<div class="page">
  <div class="pn">${inv}</div><div class="sh">Additional Commentary — ${qtr} <span style="font-size:11px;font-weight:400;letter-spacing:1px;opacity:0.7">(continued)</span></div>
  ${pair.map((src,j)=>`<div style="margin-bottom:16px;page-break-inside:avoid;break-inside:avoid"><img src="${src}" alt="Chart ${i+j+1}" style="width:100%;height:auto;display:block;border-radius:6px;border:1px solid #c8e6de;"/></div>`).join('')}
  <div class="footer-prop">${inv}</div><img src="${LOGO_SYMBOL}" class="footer-logo"/><div class="pgn">${pg.v()}</div>
</div>`);
  }
  return pages.join('\n');
})()}
<!-- PAGE 3: SNAPSHOT + LOAN -->
<div class="page">
  <div class="pn">${inv}</div><div class="sh">Portfolio Snapshot — ${qtr}</div>
  <div class="sg">
    <div class="sc hl"><div class="sl">Total Income</div><div class="sv">${fmtWhole(m.totalIncome)}</div></div>
    <div class="sc hl"><div class="sl">Total Expenses</div><div class="sv">${fmtWhole(m.totalExpense)}</div></div>
    <div class="sc hl"><div class="sl">Net Operating Income</div><div class="sv">${fmtWhole(m.noi)}</div></div>
    <div class="sc"><div class="sl">Avg Physical Occupancy (Weighted)</div><div class="sv">${m.occupancy}%</div></div>
    <div class="sc"><div class="sl">Avg Economic Occupancy (Weighted)</div><div class="sv">${m.avgEconOcc?m.avgEconOcc+"%":"—"}</div></div>
    <div class="sc"><div class="sl">Total Units</div><div class="sv">${m.totalUnits||(m.propertyMetrics?m.propertyMetrics.reduce((s,p)=>s+(p.unitCount||0),0):0)||"—"}</div></div>
  </div>
  ${(()=>{
    const hasPrincipal=sec.loanPrincipal&&(loan.principalInception||loan.principalCurrent);
    const hasWriteoffs=sec.writeoffs&&loan.writeoffs;
    if(!hasPrincipal&&!hasWriteoffs) return "";
    return `<div class="sh2">Loan & Write-off Summary</div>
  <div class="loan-row">
    ${hasPrincipal?`<div class="loan-tile">
      <h3>Total Loan Principal Paid</h3>
      <div class="loan-inner">
        ${loan.principalInception?`<div><div class="ll2">Inception – ${loanInceptionDate}</div><div class="lv2">${loanInception}</div></div>`:""}
        ${loan.principalCurrent?`<div><div class="ll2">Inception – ${loanDate}</div><div class="lv2">${loanCurrent}</div></div>`:""}
      </div>
    </div>`:""}
    ${hasWriteoffs?`<div class="loan-tile">
      <h3>Total Writeoffs from Inception</h3>
      <div style="font-size:28px;font-weight:700;color:var(--dark);margin-top:6px;">${writeoffs}</div>
    </div>`:""}
  </div>`;
  })()}
  <div class="footer-prop">${inv}</div><img src="${LOGO_SYMBOL}" class="footer-logo"/><div class="pgn">${pg.v()}</div>
</div>
${sec.businessPlan && bp.enabled ? `
<!-- PAGE BP: BUSINESS PLAN STATUS -->
<div class="page">
  <div class="pn">${inv}</div><div class="sh">Business Plan Status — ${qtr}</div>
  <div class="sh2">Remodel Progress</div>
  ${(()=>{
    const comp=parseInt(bp.unitsCompleted)||0;
    const rem=parseInt(bp.unitsRemaining)||0;
    const total=comp+rem;
    const pct=total>0?Math.min(100,Math.round(comp/total*100)):0;
    const r=58,circ=+(2*Math.PI*r).toFixed(2);
    const arc=total>0?+((pct/100)*circ).toFixed(2):0;
    const donut=total>0?`<svg viewBox="0 0 150 150" width="150" height="150" style="flex-shrink:0;display:block">
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="14"/>
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="#00c48c" stroke-width="14"
        stroke-dasharray="${arc} ${circ}" stroke-linecap="round"
        transform="rotate(-90 75 75)"/>
      <text x="75" y="70" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#1a3a35">${pct}%</text>
      <text x="75" y="91" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a8070">${comp} of ${total} units</text>
    </svg>`:'';
    return `<div style="display:flex;gap:24px;align-items:center;margin-bottom:20px;font-family:sans-serif;">
      <div style="flex:1">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div style="background:var(--dark);border-radius:8px;padding:14px 16px;text-align:center;">
            <div style="font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Units Completed</div>
            <div style="font-size:34px;font-weight:700;color:white">${comp||"—"}</div>
          </div>
          <div style="background:var(--teal-light);border-radius:8px;padding:14px 16px;text-align:center;">
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Units Remaining</div>
            <div style="font-size:34px;font-weight:700;color:var(--dark)">${rem||"—"}</div>
          </div>
        </div>
        ${total>0?`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px"><span>Remodel completion</span><span>${pct}% (${comp} of ${total} units)</span></div>
        <div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:var(--teal);border-radius:4px;"></div>
        </div>`:''}
      </div>
      ${donut}
    </div>`;
  })()}
  <div class="sh2">Budget vs. Actual</div>
  <div style="margin-bottom:20px;font-family:sans-serif;">
    ${(()=>{
      const budget=parseFloat(String(bp.totalBudget||"0").replace(/[$,]/g,""))||0;
      const spent=parseFloat(String(bp.spentToDate||"0").replace(/[$,]/g,""))||0;
      const pct=budget>0?Math.min(100,Math.round(spent/budget*100)):0;
      const remaining=budget-spent;
      const capexItems=(bp.bpCapexParsed&&bp.bpCapexParsed.items)||[];
      const remodels=(bp.bpCapexParsed&&bp.bpCapexParsed.remodels)||[];
      const totalAllCapex=(bp.bpCapexParsed&&bp.bpCapexParsed.totalAllCapex)||0;
      const remodelsTotal=Math.round(remodels.reduce((s,u)=>s+u.totalCost,0));
      const avgPerUnit=remodels.length>0?Math.round(remodelsTotal/remodels.length):0;
      const otherCapex=totalAllCapex>remodelsTotal?Math.round(totalAllCapex-remodelsTotal):0;
      const remodelPct=totalAllCapex>0?Math.round(remodelsTotal/totalAllCapex*100):0;
      const comp=parseInt(bp.unitsCompleted)||0;
      const rem=parseInt(bp.unitsRemaining)||0;
      const totalUnits=comp+rem;
      const unitsPct=totalUnits>0?Math.min(100,Math.round(comp/totalUnits*100)):0;
      const delta=budget>0&&totalUnits>0?pct-unitsPct:null;
      return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;">
        <div style="background:var(--teal-light);border-radius:8px;padding:14px 16px;">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total Budget</div>
          <div style="font-size:20px;font-weight:700;color:var(--dark)">${budget>0?'$'+budget.toLocaleString():"—"}</div>
        </div>
        <div style="background:var(--dark);border-radius:8px;padding:14px 16px;">
          <div style="font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Spent to Date</div>
          <div style="font-size:20px;font-weight:700;color:white">${spent>0?'$'+spent.toLocaleString():"—"}</div>
        </div>
        <div style="background:var(--teal-light);border-radius:8px;padding:14px 16px;">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Remaining</div>
          <div style="font-size:20px;font-weight:700;color:var(--dark)">${budget>0?'$'+remaining.toLocaleString():"—"}</div>
        </div>
      </div>
      ${budget>0&&totalUnits>0?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div style="background:#f9fffe;border:1px solid #c8e6de;border-radius:8px;padding:12px 14px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
            <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Budget Spent</div>
            <div style="font-size:18px;font-weight:700;color:var(--dark)">${pct}%</div>
          </div>
          <div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:var(--teal);border-radius:4px;"></div>
          </div>
        </div>
        <div style="background:#f9fffe;border:1px solid #c8e6de;border-radius:8px;padding:12px 14px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
            <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Units Complete</div>
            <div style="font-size:18px;font-weight:700;color:var(--dark)">${unitsPct}%</div>
          </div>
          <div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${unitsPct}%;background:#00c48c;border-radius:4px;"></div>
          </div>
        </div>
      </div>
      ${delta!==null?`<div style="font-size:10px;color:${Math.abs(delta)<=5?'#166534':delta>5?'#92400e':'#1e40af'};background:${Math.abs(delta)<=5?'#f0fdf4':delta>5?'#fffbeb':'#eff6ff'};border-radius:6px;padding:7px 12px;margin-bottom:14px;text-align:center;">
        ${Math.abs(delta)<=5
          ? `Budget spend and unit completion are well aligned (${pct}% spent / ${unitsPct}% complete)`
          : delta>5
            ? `Spending is running ${delta}pp ahead of unit completion (${pct}% spent / ${unitsPct}% complete)`
            : `Unit completion is running ${Math.abs(delta)}pp ahead of spend (${unitsPct}% complete / ${pct}% spent)`}
      </div>`:''}`:budget>0?`<div style="margin-bottom:6px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>Budget utilization</span><span>${pct}%</span></div>
      <div style="height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin-bottom:14px;">
        <div style="height:100%;width:${pct}%;background:var(--teal);border-radius:5px;"></div>
      </div>`:""}
      ${spent>0&&remodels.length>0?`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:10px;">
        <div style="background:#e6f9f4;border-radius:8px;padding:12px 14px;border-left:3px solid #00c48c;">
          <div style="font-size:9px;color:#5a8070;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Unit Remodel Spend</div>
          <div style="font-size:18px;font-weight:700;color:#1a3a35;">$${remodelsTotal.toLocaleString()}</div>
          <div style="font-size:10px;color:#5a8070;margin-top:2px">${remodelPct}% of all property capex</div>
        </div>
        <div style="background:#f3f4f6;border-radius:8px;padding:12px 14px;border-left:3px solid #9ca3af;">
          <div style="font-size:9px;color:#5a8070;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Other Property CapEx</div>
          <div style="font-size:18px;font-weight:700;color:#1a3a35;">${otherCapex>0?'$'+otherCapex.toLocaleString():'—'}</div>
          <div style="font-size:10px;color:#5a8070;margin-top:2px">${totalAllCapex>0?(100-remodelPct)+'% of all property capex':''}</div>

// ─── PROCESS DATA ────────────────────────────────────────────────────────────
function processData() {
  if(state.source==='appfolio'){processDataAppFolio();return;}
  processBuildium();
}
function calcOccAppFolio(csv){
  const rows=parseDelim(csv||"");
  const summaryRow=rows.find(r=>/\d+\s*units?/i.test(r["Unit"]||""));
  if(summaryRow){const pct=parseFloat((summaryRow["Status"]||"").replace("%",""));if(!isNaN(pct))return Math.round(pct);}
  const tr=rows.filter(r=>{const u=(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&r["Status"];});
  const vc=tr.filter(r=>/vacant/i.test(r["Status"]||"")).length;
  return tr.length>0?Math.round(((tr.length-vc)/tr.length)*100):0;
}
function processDataAppFolio() {
  try {
    showError("");
    // Income statement is now optional — if missing, all financial fields stay
    // at zero and the Income Statement / Snapshot tiles auto-hide downstream.
    let totalIncome = 0, totalExpense = 0, noi = 0, capex = 0;
    let capexItems = [], incomeRows = [], monthCols = [];
    if (state.files.income) {
      const parsed = parseQuarterFromExcel(state.files.income, state.currentQuarter || "");
      if (parsed) {
        ({ totalIncome, totalExpense, noi, capex, capexItems, incomeRows, monthCols } = parsed);
        if (!totalIncome && !totalExpense) {
          showError("Warning: Income Statement parsed but contained no totals. Verify the file is a 12-month AppFolio statement and the quarter is set correctly.");
        }
      } else {
        showError("Warning: Could not parse the Income Statement file. Income / expense / NOI will show as $0.");
      }
    } else {
      showError("Warning: No Income Statement uploaded. Income / expense / NOI / capex will show as $0 on the report.");
    }
    // ── Rent Rolls — occupancy ───────────────────────────────────────────────
    const occ1 = calcOccAppFolio(state.files.rr1);
    const occ2 = calcOccAppFolio(state.files.rr2);
    const occ3 = calcOccAppFolio(state.files.rr3);
    const occupancy = Math.round((occ1 + occ2 + occ3) / 3);
    // ── Rent Roll — Loss to Lease & Rent Roll display ────────────────────────
    const finalRows = parseDelim(state.files.rr3).filter(r => {
      const u = (r["Unit"]||"").trim();
      return u && !/^\d+\s*units?$/i.test(u) && !/^total/i.test(u) && !/^->/.test(u) && u.length < 50;
    });
    let mkt=0, act=0;
    finalRows.forEach(r => {
      const status = (r["Status"]||"").toUpperCase();
      if (!status.includes("VACANT")) {
        mkt += parseCur(r["Market Rent"]||r["MarketRent"]||r["Mkt Rent"]||0);  // FIX: handle camelCase export variant
        act += parseCur(r["Rent"]||0);
      }
    });
    // Rent Roll display columns
    const RR_COLS_AF = [
      {label:"Unit",       pat:/^unit$/i},
      {label:"Bed/Bath",   pat:/^bd\/ba$/i},
      {label:"Lease From", pat:/^lease\s*from$/i},
      {label:"Lease To",   pat:/^lease\s*to$/i},
      {label:"Market Rent", pat:/^market\s*rent$/i},
      {label:"Rent",       pat:/^rent$/i},
    ];
    const rrAllHeaders = Object.keys(finalRows[0]||{});
    if(!finalRows.length) showError("Warning: AppFolio rent roll (Month 3) had no unit rows after filtering. The rent roll section will be empty — verify the CSV column headers.");
    const rrColMap = RR_COLS_AF.map(c=>({label:c.label, src:rrAllHeaders.find(h=>c.pat.test(h.trim()))||null})).filter(c=>c.src);
    const rrHeaders = rrColMap.map(c=>c.label);
    const statusHeader = rrAllHeaders.find(h=>/^status$/i.test(h.trim()))||null;
    const rentRollRows = finalRows
      .map(r=>{const o={};rrColMap.forEach(c=>o[c.label]=r[c.src]??"");o.__vacant=!!(statusHeader&&(r[statusHeader]||"").toUpperCase().includes("VACANT"));return o;})
      .sort((a,b)=>a.__vacant===b.__vacant?0:a.__vacant?1:-1);
    // ── Delinquency ──────────────────────────────────────────────────────────
    // From "Delinquency As Of" report — Total row, Amount Receivable column
    if(!state.files.delinquency) showError("Warning: Delinquency file not uploaded — delinquency will show $0.");
    let delinquency = 0;
    const delinqRows = parseDelim(state.files.delinquency||"");
    const delinqTotal = delinqRows.find(r => /^total$/i.test((r["Unit"]||r["Name"]||"").trim()));
    if (delinqTotal) {
      delinquency = parseCur(delinqTotal["Amount Receivable"]||0);
    } else {
      // Fallback: sum all Amount Receivable values (skip property header row)
      delinqRows.forEach(r => {
        const amt = parseCur(r["Amount Receivable"]||0);
        if (amt > 0) delinquency += amt;
      });
    }
    // ── Leasing Summary ──────────────────────────────────────────────────────
    // Columns: Unit Type, # of Units, # of Model Units, Inquiries Received,
    //          Showings Completed, Applications Received, Move Ins, Move Outs, Leased
    let newLeases=0, inquiries=0, applications=0;
    const leasingRows = parseDelim(state.files.leasingSummary||state.files.leasing||"");
    const leasingTotal = leasingRows.find(r => /^total/i.test(r["Unit Type"]||""));
    if (leasingTotal) {
      newLeases    = parseInt(leasingTotal["Leased"]||0)||0;
      inquiries    = parseInt(leasingTotal["Inquiries Received"]||0)||0;
      applications = parseInt(leasingTotal["Applications Received"]||0)||0;
    } else {
      // Fallback: sum all non-header rows
      leasingRows.forEach(r => {
        newLeases    += parseInt(r["Leased"]||0)||0;
        inquiries    += parseInt(r["Inquiries Received"]||0)||0;
        applications += parseInt(r["Applications Received"]||0)||0;
      });
    }
    // ── Renewal Summary ──────────────────────────────────────────────────────
    // Format varies: "Total X Offers", "Total Offers: X", tabular with Count/Renewals column
    let renewals = 0;
    const renewalText = state.files.renewalSummary||"";
    const totalMatch = renewalText.match(/Total\s+(\d+)\s+Offers/i)
      || renewalText.match(/Total\s+Offers[:\s]+(\d+)/i)
      || renewalText.match(/(\d+)\s+Total\s+Offers/i);
    if (totalMatch) {
      renewals = parseInt(totalMatch[1])||0;
    } else {
      // Fallback 1: count rows with Status = "Renewed"
      const renewalRows = parseDelim(renewalText);
      const renewedCount = renewalRows.filter(r=>/renewed/i.test(r["Status"]||"")).length;

function loadFile(key, asBuffer, cb){
  const inp=document.createElement("input"); inp.type="file";
  inp.accept=(asBuffer==='auto'||asBuffer==='text')?".xlsx,.xls,.csv,.tsv,.txt":asBuffer?".xlsx,.xls":".csv,.tsv,.txt";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const isXL=["xlsx","xls"].includes(f.name.split(".").pop().toLowerCase());
    const onFail=()=>showError("Could not read \""+f.name+"\". The file may be corrupt or inaccessible.");
    if(asBuffer==='text' && isXL){
      // Excel uploaded for a text-type field — convert to CSV text via XLSX.js
      const r=new FileReader();
      r.onload=ev=>{ cb(xlsxToText(ev.target.result)); render(); };
      r.onerror=onFail;
      r.readAsArrayBuffer(f);
    } else {
      // Resolve read mode. 'auto' → match file extension; 'text' → always text;
      // boolean true → ArrayBuffer (Excel); boolean false → text (CSV).
      // Note: before this fix, `useBuffer='text'` was a truthy STRING that
      // caused readAsArrayBuffer() on CSVs, producing zeros in Buildium reports.
      let useBuffer;
      if(asBuffer==='auto') useBuffer=isXL;
      else if(asBuffer==='text') useBuffer=false;
      else useBuffer=!!asBuffer;
      const r=new FileReader();
      r.onload=ev=>{ cb(ev.target.result); render(); };
      r.onerror=onFail;
      useBuffer?r.readAsArrayBuffer(f):r.readAsText(f);
    }
  };
  inp.click();
}

// Order matters — more specific patterns must come before substrings of themselves
const CHART_MAP = [
  { key:"chart_income_vs_expense", match:"operating income vs expense" },
  { key:"chart_noi",               match:"net operating income" },
  { key:"chart_operating_income",  match:"operating income" },
  { key:"chart_operating_expense", match:"operating expense" },
  { key:"chart_lease_expirations", match:"lease expirations" },
  { key:"chart_rent_growth",       match:"rent growth" },
  { key:"chart_occupancy_rate",    match:"occupancy rate per unit" },
  { key:"chart_capital_expense",   match:"capital expense" },

  { key:"chart_loss_to_lease",     match:"loss to lease" },
];
function loadAllCharts(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".png,.jpg,.jpeg"; inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    let matched=0, unmatched=[], failed=[];
    let pending=files.length;
    files.forEach(f=>{
      const name=f.name.replace(/\.[^.]+$/,"").toLowerCase().trim();
      // Find first matching rule (most-specific-first order)
      const rule=CHART_MAP.find(r=>name.includes(r.match));
      if(!rule){ unmatched.push(f.name); pending--; if(pending===0){afterLoad(matched,unmatched);} return; }
      const r=new FileReader();
      r.onload=ev=>{
        state.charts[rule.key]=ev.target.result;
        matched++;
        pending--;
        if(pending===0) afterLoad(matched,unmatched);
      };
      r.onerror=()=>{
        failed.push(f.name);
        pending--;
        if(pending===0) afterLoad(matched,unmatched);
      };
      r.readAsDataURL(f);
    });
    function afterLoad(matched,unmatched){
      saveChartsForKey(currentSaveKey(),state.charts);
      render();
      const msgs=[];
      if(unmatched.length>0) msgs.push("Could not match "+unmatched.length+" file(s): "+unmatched.join(", ")+". Check filenames and try uploading manually.");
      if(failed.length>0) msgs.push("Failed to read "+failed.length+" file(s): "+failed.join(", ")+". The file may be corrupt or inaccessible.");
      showError(msgs.join(" "));
    }
  };

const rrSuffix=fname=>{const m=(fname||"").match(/\((\d+)\)/);return m?parseInt(m[1]):0;};

function loadAllBuildiumFiles(){
  const inp=document.createElement("input");

  inp.accept=".xlsx,.xls,.csv,.tsv,.txt";
  inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files);
    if(!files.length) return;
    const norm=s=>s.replace(/_/g," ").toLowerCase();
    const has=(fname,...terms)=>terms.some(t=>norm(fname).includes(t));
    const assigned={};
    const rrFiles=[];
    const unmatched=[];
    files.forEach(f=>{
      const base=f.name.replace(/\.[^.]+$/,"");
      const ext=f.name.split(".").pop().toLowerCase();
      const isExcel=["xlsx","xls"].includes(ext);
      // Balance Sheet must come before "income statement" check since neither
      // term overlaps, but ordering is a cheap safeguard against future renames.
      if(has(base,"balance sheet"))
        {assigned.balanceSheet={file:f,asBuffer:true};return;}
      if(has(base,"income statement","profit and loss","profit loss","p&l","cash flow"))
        {assigned.income={file:f,asBuffer:isExcel};return;}
      if(has(base,"rent roll"))
        {rrFiles.push(f);return;}

      // for capital accounts, sometimes downloaded with "capex" in the name.
      if(has(base,"capex detail","capex_detail","capex","transaction detail by account","transaction_detail_by_account"))
        {assigned.capexDetail={file:f,asBuffer:isExcel};return;}
      // "Leasing Agent Report" or similar. Check AFTER capex/rent-roll so
      // those more specific matches win on filenames that include "leasing".
      if(has(base,"leasing agent","leasing report","activity by lease","leasing"))
        {assigned.leasing={file:f,asBuffer:'text'};return;}
      if(has(base,"delinquent","delinquency"))
        {assigned.delinquency={file:f,asBuffer:'text'};return;}
      // Buildium community/rent-engine performance export.
      if(has(base,"rent engine","community performance","leasing data","property performance"))
        {assigned.rentEngine={file:f,asBuffer:'text'};return;}
      unmatched.push(f.name);
    });
    rrFiles.sort((a,b)=>rrSuffix(a.name)-rrSuffix(b.name));
    rrFiles.forEach((f,i)=>{
      if(i<3) assigned[["rr1","rr2","rr3"][i]]={file:f,asBuffer:'text'};
      else unmatched.push(f.name);
    });
    const toRead=Object.entries(assigned);
    if(!toRead.length){showError("No files matched. Expected Buildium filenames containing: rent_roll, income_statement (or cash_flow), balance_sheet, leasing, delinquent, capex, or rent_engine.");return;}
    let pending=toRead.length, matchedCount=0;
    const failed=[];
    toRead.forEach(([key,{file,asBuffer}])=>{
      const isXL=["xlsx","xls"].includes(file.name.split(".").pop().toLowerCase());
      const finish=result=>{
        state.files[key]=result;
        if(["rr1","rr2","rr3"].includes(key)&&typeof result==="string")
          tryAutoFillPropertyName(result);
        matchedCount++; pending--;
        if(pending===0) done();
      };
      const fail=()=>{ failed.push(file.name); pending--; if(pending===0) done(); };
      if(asBuffer==='text' && isXL){
        const r=new FileReader();
        r.onload=ev=>finish(xlsxToText(ev.target.result));
        r.onerror=fail;
        r.readAsArrayBuffer(file);
      } else {
        const r=new FileReader();
        r.onload=ev=>finish(ev.target.result);
        r.onerror=fail;
        asBuffer===true?r.readAsArrayBuffer(file):r.readAsText(file);
      }
    });
    function done(){
      render();
      const msgs=[];
      if(unmatched.length>0) msgs.push("Matched "+matchedCount+" of "+files.length+" files. Could not auto-match: "+unmatched.join(", ")+". Upload those individually.");
      if(failed.length>0) msgs.push("Failed to read: "+failed.join(", ")+".");
      showError(msgs.join(" "));
    }
  };
  inp.click();
}

// Normalize a property name to a storage-safe token.
//   • NFKD + diacritic stripping so "Café" ≡ "Cafe"
//   • collapse runs of non-alphanum to a single "_"
//   • trim leading/trailing underscores
// Used by both photoStorageKey and assetFactsKey so photos & facts share the
// same fuzzy-matching space.
function normalizePropertyKey(name){
  if(!name) return "";
  return String(name)
    .normalize("NFKD").replace(/[\u0300-\u036f]/g,"")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"");
}
function photoStorageKey(name){ return "lw_photo_" + normalizePropertyKey(name); }
// Resize and re-encode a photo as JPEG before storing — keeps size small for efficient IndexedDB storage.
// Max 1200px on the long edge, 80% quality — plenty of detail for a report cover photo.
function compressPhoto(dataUri, cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=1200;
    let w=img.width, h=img.height;
    if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} } else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.80));
  };
  img.onerror=()=>cb(dataUri); // fall back to original if decode fails
  img.src=dataUri;
}
function savePhotoForProperty(name, dataUri){
  if(!name||!dataUri) return;

// Boundary-aware fuzzy-lookup score for two normalized property keys.
// Either key must be a full token-bounded substring of the other — so
// "oak_park" matches "oak_park_apts" but not "riverpark" (which only shares
// "park" as a sub-word).
function fuzzyKeyScore(a, b){
  if(!a || !b) return 0;
  if(a === b) return a.length;
  const ha = "_" + a + "_";
  const hb = "_" + b + "_";
  if(hb.indexOf(ha) !== -1) return a.length;
  if(ha.indexOf(hb) !== -1) return b.length;
  return 0;
}
// Fuzzy-only photo lookup: scans lw_photo_* keys without retrying the exact match.
// Used by onPropertyNameBlur when the exact lookup was already attempted during typing.
function _fuzzyPhotoScan(name){
  if(!name) return null;
  try{
    const targetKey=photoStorageKey(name);
    const norm=targetKey.slice("lw_photo_".length);
    if(!norm) return null;
    let best=null, bestScore=0;
    for(const k of dbKeys()){
      if(!k.startsWith("lw_photo_")) continue;
      const stored=k.slice("lw_photo_".length);
      const score=fuzzyKeyScore(norm, stored);
      if(score>=5&&score>bestScore){best=k;bestScore=score;}
    }
    if(best) return dbGet(best);
    const aliases=getPropertyAliases(name);
    for(const alias of aliases){
      if(alias===name) continue;
      const aliasVal=dbGet(photoStorageKey(alias));
      if(aliasVal) return aliasVal;
    }
    return null;
  } catch(e){ return null; }
}
function loadPhotoForProperty(name){
  if(!name) return null;
  try{
    // Compute once and reuse — avoids two calls to photoStorageKey in the same lookup
    const targetKey=photoStorageKey(name);
    // Exact match first
    const exact=dbGet(targetKey);
    if(exact) return exact;
    // Fuzzy: scan all lw_photo_* keys for one whose normalized name is a
    // token-bounded substring of ours (or vice versa). Minimum score 5 chars to
    // guard against trivial tokens ("the", "apts") dragging in random hits.
    const norm=targetKey.slice("lw_photo_".length);
    if(!norm) return null;
    let best=null, bestScore=0;
    for(const k of dbKeys()){
      if(!k.startsWith("lw_photo_")) continue;
      const stored=k.slice("lw_photo_".length);
      const score=fuzzyKeyScore(norm, stored);
      if(score>=5&&score>bestScore){best=k;bestScore=score;}
    }
    if(best) return dbGet(best);
    // Alias fallback: if the fuzzy scan found nothing, try every known alias
    // for this property. Covers cases where the photo was saved under one name
    // (e.g. "1003-1005 Ave K") and loaded under another ("Carter Place").
    const aliases=getPropertyAliases(name);
    for(const alias of aliases){
      if(alias===name) continue;
      const aliasKey=photoStorageKey(alias);
      const aliasVal=dbGet(aliasKey);
      if(aliasVal) return aliasVal;
    }
    return null;
  } catch(e){ return null; }
}
function removePhotoForProperty(name){
  if(!name) return;
  dbRemove(photoStorageKey(name));
}

function onPropertyNameBlur(val){

  // any lookup. This prevents partial names like "The G" (4 chars) from matching
  // garbage db keys that were written by older sessions during intermediate keystrokes.
  const normAlphaLen=normalizePropertyKey(val).replace(/_/g,'').length;

  // the property (e.g. "Greenway 1" → "The Greenway 1"). Deferred from onPropertyNameChange
  // to avoid writing garbage short-name keys.
  if(state.propertyPhoto) savePhotoForProperty(val, state.propertyPhoto);

// real names of 6+ chars (e.g. "bgflats"=7, "thegreenway1"=12) are left intact.
function cleanupGarbageDbKeys(){
  try{

      if(!k.startsWith('lw_photo_')&&!k.startsWith('lw_assetfacts_')) continue;
      const prefix=k.startsWith('lw_photo_')?'lw_photo_':'lw_assetfacts_';
      const suffix=k.slice(prefix.length);

function parseQuarterFromExcel(buffer, currentQuarter) {

    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    // Month header detection + parseColMonth are shared at module scope
    // (MONTH_COL_PAT, MO_ABBR_CAP, Q_MONTH_MAP, parseColMonth).
    // Find header row (search up to row 20 to accommodate metadata rows)
    let headerRowIdx = -1, allMonthCols = [];
    for(let i = 0; i < Math.min(MAX_HEADER_SEARCH_ROWS, rows.length); i++) {
      const hits = rows[i].map((c,idx) => ({c:normXlCell(c), idx})).filter(({c}) => MONTH_COL_PAT.test(c));
      if(hits.length >= 3) { headerRowIdx = i; allMonthCols = hits.map(({c,idx}) => ({label:c, colIdx:idx})); break; }
    }
    if(headerRowIdx < 0) return null;
    // Identify current quarter's 3 months
    const qMatch = currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
    if(!qMatch) return null;
    const qNum = parseInt(qMatch[1]), yr = parseInt(qMatch[2]);
    const curMoIdxs = Q_MONTH_MAP[qNum];
    const curYr2 = String(yr).slice(2); // 2-digit year fallback
    const curColIdxs = curMoIdxs.map(mi => {
      const col = allMonthCols.find(c => {
        const p = parseColMonth(c.label);
        if(p) return p.monthIdx===mi && p.year===yr;
        return c.label.toLowerCase().startsWith(MO_ABBR_CAP[mi].toLowerCase()) &&
          (c.label.includes(String(yr)) || c.label.includes(curYr2));
      });
      return col ? col.colIdx : null;
    }).filter(v => v !== null);
    if(curColIdxs.length < 3) return null;
    // Month columns for income statement display (only current quarter)
    const monthCols = curMoIdxs.map((mi, i) => ({label: MO_ABBR_CAP[mi], colIdx: curColIdxs[i]}));
    const pC = v => { if(v===null||v===undefined||v==="") return 0; const n=parseFloat(String(v).replace(/[$,()]/g,"").trim()); return isNaN(n)?0:(String(v).includes("(")?-n:n); };
    // First pass: collect names that have a "Total X" counterpart — these are genuine section groupings.
    // e.g. "Total RENTS" → "rents" is a grouping header; "Prepaid Rent" has no Total row → it's a line item.
    const SKIP_TOTALS = new Set(["total operating income","total income","total operating expense","total capital expenses","total for capital improvements","total maintenance - capex","noi - net operating income","net operating income","net income"]);
    const sectionGroupNames = new Set();
    for(const row of rows.slice(headerRowIdx+1)){
      const lbl = String(row[0]||"").trim().toLowerCase().replace(/\s+/g," ");
      if(lbl.startsWith("total ") && !SKIP_TOTALS.has(lbl))
        sectionGroupNames.add(lbl.replace(/^total\s+/,"").trim());
    }
    let totalIncome=0, totalExpense=0, noi=0, capex=0, inCapex=false;
    let _tiSet=false, _teSet=false; // track whether operating-specific totals already found
    const capexItems=[], incomeRows=[];
    for(const row of rows.slice(headerRowIdx+1)) {
      const rawLabel = String(row[0]||"").trimEnd();
      const label = rawLabel.trim().toLowerCase().replace(/\s+/g," ");
      if(!label) continue;
      const monthAmounts = curColIdxs.map(ci => pC(row[ci]||0));
      const quarterTotal = monthAmounts.reduce((s,v)=>s+v, 0);
      // Key totals — prioritise "Total Operating X" so AppFolio's later aggregate "Total X" rows
      // (which include capital expenses, mortgage, etc.) don't overwrite the correct values.
      if(label==="total operating income"){totalIncome=quarterTotal;_tiSet=true;}
      else if(label==="total income"&&!_tiSet) totalIncome=quarterTotal;
      if(label==="total operating expense"||label==="total operating expenses"){totalExpense=quarterTotal;_teSet=true;}
      else if((label==="total expense"||label==="total expenses")&&!_teSet) totalExpense=quarterTotal;
      // noi calculated below from totalIncome - totalExpense to avoid Buildium labelling differences
      if(label==="capital expenses"||label==="capital improvements"||label==="maintenance - capex") inCapex = true;
      if(label==="total capital expenses"||label==="total for capital improvements"||label==="total maintenance - capex") { capex=Math.abs(quarterTotal); inCapex=false; }
      if(label==="capital expenditures"&&quarterTotal!==0){ capex=Math.abs(quarterTotal); capexItems.push({name:rawLabel.trim(),amount:Math.abs(quarterTotal)}); }
      if(inCapex && label && !label.startsWith("total") && quarterTotal!==0 && label!=="capital expenses" && label!=="capital improvements" && label!=="maintenance - capex") {
        capexItems.push({name:rawLabel.trim(), amount:Math.abs(quarterTotal)});
      }
      // Income statement rows for report display
      const allZero = monthAmounts.every(v=>v===0);
      const isTotal = label.startsWith("total")||label==="noi - net operating income"||label==="net income";
      const indentCount = rawLabel.length - rawLabel.trimStart().length;
      const indent = indentCount > 0 ? 1 : 0;
      // A row is a section header only if: all amounts are zero (across all months), it's not a
      // total row, AND it has a matching "Total X" row elsewhere in the statement.
      // NOTE: indentCount is intentionally NOT used here — low-indent zero-amount line items
      // (e.g. "  Pest Control" with $0 in all months) must be excluded, not shown as headers.
      const isSectionHeader = allZero && !isTotal && sectionGroupNames.has(label);
      incomeRows.push({label:rawLabel.trim(), amount:quarterTotal||null, monthAmounts, indent, indentCount, isTotal, isSectionHeader});
    }
    if(totalIncome || totalExpense) noi = totalIncome - totalExpense;
    return {totalIncome, totalExpense, noi, capex, capexItems, incomeRows, monthCols};
  } catch(e) { return null; }
}
// parsePriorQuarterFromExcel: Extracts PRIOR quarter metrics from a 12-month income statement.
function parsePriorQuarterFromExcel(buffer, currentQuarter) {
  try {
    const wb = XLSX.read(buffer, {type:"array", cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    // Month header detection + parseColMonth are shared at module scope
    // (MONTH_COL_PAT, MO_ABBR_CAP, Q_MONTH_MAP, parseColMonth).
    // Search up to row 20 (consistent with parseQuarterFromExcel)
    let headerRowIdx = -1, monthCols = [];
    for(let i=0; i<Math.min(MAX_HEADER_SEARCH_ROWS,rows.length); i++){
      const hits = rows[i].map((c,idx)=>({c:normXlCell(c),idx})).filter(({c})=>MONTH_COL_PAT.test(c));
      if(hits.length >= 3){ headerRowIdx=i; monthCols=hits.map(({c,idx})=>({label:c,colIdx:idx})); break; }
    }
    if(headerRowIdx<0 || monthCols.length<3){
      showError("Warning: Prior quarter comparison — could not find month column headers in the income statement. Prior quarter data will be blank. Make sure the uploaded file is a trailing 12-month income statement.");
      return null;
    }
    // Identify current quarter months
    const qMatch = currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
    if(!qMatch) return null;
    const qNum=parseInt(qMatch[1]), yr=parseInt(qMatch[2]);
    const prevQNum = qNum===1?4:qNum-1;
    const prevYr = qNum===1?yr-1:yr;
    const prevMoIdxs = Q_MONTH_MAP[prevQNum];
    const expectedMonths = prevMoIdxs.map(mi=>MO_ABBR_CAP[mi]+" "+prevYr).join(", ");
    // Find column indices for prior quarter months
    const prevColIdxs = prevMoIdxs.map(mi=>{
      const col = monthCols.find(c=>{
        const p=parseColMonth(c.label);
        if(p) return p.monthIdx===mi && p.year===prevYr;
        // Fallback: label starts with month name and contains year (4-digit or 2-digit)
        const prevYr2=String(prevYr).slice(2); // e.g. "25" for 2025
        return c.label.toLowerCase().startsWith(MO_ABBR_CAP[mi].toLowerCase())&&
          (c.label.includes(String(prevYr))||c.label.includes(prevYr2));
      });
      return col?col.colIdx:null;
    }).filter(v=>v!==null);
    if(prevColIdxs.length < 3){
      const foundLabels = monthCols.slice(0,6).map(c=>c.label).join(", ")+(monthCols.length>6?" ...":"");
      showError("Warning: Prior quarter columns ("+expectedMonths+") not found in income statement. Columns found: "+foundLabels+". Prior quarter comparison will be blank. Verify the trailing 12-month file covers the prior quarter period.");
      return null;
    }
    // Sum prior quarter values for key rows
    let prevIncome=0, prevExpense=0, prevNoi=0, prevCapex=0;
    let inExpenseSection=false, _prevTeSet=false, _prevTiSet=false;
    const prevExpenseCats=[];
    const dataRows = rows.slice(headerRowIdx+1);
    for(const row of dataRows){
      const rawLabel = String(row[0]||row[1]||"").trimEnd();
      const label = rawLabel.trim().toLowerCase().replace(/\s+/g," ");
      const colSum = prevColIdxs.reduce((s,ci)=>s+parseCur(row[ci]),0);
      // Income: prioritise "total operating income" over later aggregate "total income"
      if(label==="total operating income"){prevIncome=colSum;_prevTiSet=true;inExpenseSection=true;continue;}
      else if(label==="total income"&&!_prevTiSet){prevIncome=colSum;inExpenseSection=true;continue;}
      // Expense: prioritise "total operating expense" so AppFolio's "total expense" row doesn't overwrite
      if(label==="total operating expense"||label==="total operating expenses"){prevExpense=colSum;_prevTeSet=true;inExpenseSection=false;}
      else if((label==="total expense"||label==="total expenses")&&!_prevTeSet){prevExpense=colSum;inExpenseSection=false;}
      if(label==="noi - net operating income"||label==="net operating income"||label==="net income"||
         label.startsWith("net non-operating")){ if(label.includes("noi")||label==="net operating income") prevNoi=colSum; inExpenseSection=false; }
      if(label==="total capital expenses"||label==="total for capital improvements"||label==="total maintenance - capex") prevCapex=Math.abs(colSum);
      if(label==="capital expenditures"&&colSum!==0) prevCapex=Math.abs(colSum);
      // Individual line items only: not a "Total X" row, not a summary/NOI row
      if(inExpenseSection && !label.startsWith("total") && !EXPENSE_NARRATIVE_EXCLUDE.has(label) && Math.abs(colSum)>0){
        prevExpenseCats.push({ name:rawLabel.trim(), amount:colSum });
      }
    }
    if(prevIncome || prevExpense) prevNoi = prevNoi || (prevIncome - prevExpense);
    const prevLabel = `Q${prevQNum} ${prevYr}`;
    return { income:prevIncome, expenses:prevExpense, noi:prevNoi, capex:prevCapex, occupancy:0, prevLabel, expenseCategories:prevExpenseCats };
  } catch(e){ return null; }
}

// parseCapexDetail: Scans a Buildium "Transaction Detail by Account" report (Excel or CSV).
//
// File structure (Buildium format):
//   Row 1: Title row
//   Row 4: Column headers — Date | Type | Property or Company | Name | Description | Amount
//   Data rows are grouped under section header rows (e.g. "Capital Improvements - Labor - General")
//   where only the first column has a value; all other columns are empty.
//
// Strategy: walk data rows within any "Capital Improvements" section, classify each
// transaction by theme (roofing, HVAC, flooring, unit turns, exteriors, etc.), and
// aggregate by section + theme. Remodel units are pulled from the Name column as
// before. Top transactions (by amount) are surfaced so narratives can cite specific,
// authentic projects rather than accounting categories.
//
// Returns {
//   remodelCount, remodelUnits: ["955-3", ...], unnamedCount,
//   topTransactions: [{amount, name, description, theme}, ...],   // top 10 by $
//   themes:          [{name, amount, count}, ...],                // sorted by $
//   sectionTotals:   [{section, amount, count}, ...],             // sorted by $
//   totalCapex
// }
// parseBalanceSheet: optional balance sheet parser. Supports the Buildium
// "Balance Sheet" export (Account Name + Balance two-column layout with an
// "As of: MM/DD/YYYY" metadata row) and degrades gracefully on variant
// layouts. Returns:
//   { asOfDate: "03/31/2026"|"",
//     rows: [{label, amount, indent, isSectionHeader, isTotal, isGrandTotal}...],
//     totals: {assets, liabilities, equity, liabilitiesAndEquity} }
// Section hierarchy is inferred from the label's leading whitespace in the
// source cell — Buildium uses 4-space increments.
function parseBalanceSheet(fileData){
  if(!fileData) return null;
  try{
    let rows = [];
    if(fileData instanceof ArrayBuffer){
      const wb = XLSX.read(fileData, {type:"array", cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    } else {
      // Accept CSV text too in case a future source emits that format.
      rows = parseDelim(fileData).map(o => Object.values(o));
    }
    if(!rows.length) return null;

    // Pull "As of: MM/DD/YYYY" from the first ~15 rows of metadata.
    let asOfDate = "";
    for(let i=0; i<Math.min(15, rows.length); i++){
      const joined = (rows[i]||[]).map(c=>String(c==null?"":c)).join(" ");
      const m = joined.match(/As of:?\s*(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/i);
      if(m){ asOfDate = m[1]; break; }
    }

    // Find the header row: contains something like "Account Name" + "Balance".
    // Be lenient on exact wording so future-Buildium tweaks don't break us.
    let headerRowIdx = -1, labelCol = -1, amountCol = -1;
    for(let i=0; i<Math.min(25, rows.length); i++){
      const cells = (rows[i]||[]).map(c=>String(c==null?"":c).trim().toLowerCase());
      const labIdx = cells.findIndex(c => /^(account\s*name|description|account)$/i.test(c));
      const amtIdx = cells.findIndex(c => /^(balance|amount|total)$/i.test(c));
      if(labIdx>=0 && amtIdx>=0 && amtIdx!==labIdx){
        headerRowIdx = i; labelCol = labIdx; amountCol = amtIdx;
        break;
      }
    }
    if(headerRowIdx < 0) return null;

    const parsedRows = [];
    const totals = { assets:null, liabilities:null, equity:null, liabilitiesAndEquity:null };

    for(let i=headerRowIdx+1; i<rows.length; i++){
      const row = rows[i] || [];
      const rawLabel = String(row[labelCol] == null ? "" : row[labelCol]);
      if(!rawLabel.trim()) continue;
      // Preserve leading whitespace for indent detection, but strip trailing.
      const leadingWs = (rawLabel.match(/^\s*/)||[""])[0];
      // Each 4-space block = one indent level; also treat tabs as 4 spaces.
      const indent = Math.max(0, Math.floor(leadingWs.replace(/\t/g,"    ").length / 4));
      const cleanLabel = rawLabel.trim();
      const rawAmount = row[amountCol];
      const hasAmount = rawAmount !== "" && rawAmount != null;
      const amount = hasAmount ? parseCur(rawAmount) : null;
      const lc = cleanLabel.toLowerCase();

      const isGrandTotal =
           /^total\s+assets\b/.test(lc)
        || /^total\s+liabilities\s*[&+]\s*(capital|equity)\b/.test(lc)
        || /^total\s+liabilities\s+(and|&|\+)\s*(capital|equity)\b/.test(lc);
      const isTotal = /^total\s+/i.test(cleanLabel) || isGrandTotal;
      const isSectionHeader = !hasAmount && !isTotal;

      // Capture the headline totals for the narrative / summary (not shown
      // on the page directly, but handy for future use).
      if(/^total\s+assets\b/.test(lc)) totals.assets = amount;
      else if(/^total\s+liabilities\s*$/.test(lc)) totals.liabilities = amount;
      else if(/^total\s+(capital|equity)\s*$/.test(lc)) totals.equity = amount;
      else if(/^total\s+liabilities\s*[&+]\s*(capital|equity)\b/.test(lc)
           || /^total\s+liabilities\s+(and|&|\+)\s*(capital|equity)\b/.test(lc))
             totals.liabilitiesAndEquity = amount;

      parsedRows.push({
        label: cleanLabel,
        amount,
        indent,
        isSectionHeader,
        isTotal,
        isGrandTotal
      });
    }

    if(!parsedRows.length) return null;
    return { asOfDate, rows: parsedRows, totals };
  } catch(e){
    console.warn('parseBalanceSheet failed:', e);
    return null;
  }
}
// parseAFCapexGL: Parses an AppFolio "General Ledger" export to extract Capital
// Expenditure transactions for a specific quarter. The file is filtered to the
// requested quarter and grouped by vendor so narratives can cite real contractor
// names rather than generic account category labels.
//
// File structure (AppFolio GL format):
//   Row ~11: Column headers — Property Name | Unit | GL Account | Date | Debit | Credit | Balance | Payee / Payer | Description | Remarks | ...
//   Sections begin with any "Capital Expenditures" GL account in col A (e.g. "8020 - Capital Expenditures")
//   Data rows: col A = property name, col D = date, col E = debit, col F = credit
//              col H = Payee/Payer (vendor for direct checks), col I = Description, col J = Remarks
//   Summary rows ("Starting Balance", "Net Change") are skipped without ending the section.
//   A GL can include multiple Capital Expenditures accounts — all are accumulated.
//
// Returns {capexItems:[{name,amount}], totalCapex} or null if not parseable/no data.
function parseAFCapexGL(fileData, quarterStr) {
  if(!fileData) return null;
  try {
    let rows = [];
    if(fileData instanceof ArrayBuffer) {
      const wb = XLSX.read(fileData, {type:"array", cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});
    } else {
      return null; // GL files are always Excel
    }
    if(!rows.length) return null;

    // Detect AppFolio "General Ledger" format: early rows contain "Date Range:" or "GL Accounts:".
    // In this format the file is pre-filtered to capex accounts and transactions are grouped
    // by MONTH (e.g. "Apr 2025") rather than by GL account section header.
    // Contrast with the older format which has "Capital Expenditures — Appliances" style headers.
    let isAFGLMonthFormat = false;
    for(let i=0; i<Math.min(15, rows.length); i++){
      const c0 = String(rows[i]?.[0]||"").trim();
      if(/^date\s*range:/i.test(c0)||/^gl\s*accounts:/i.test(c0)){isAFGLMonthFormat=true;break;}
    }

    // Detect AF GL format: look for header row with "GL Account" and "Payee"
    let headerRowIdx = -1;
    let colDate=-1, colDebit=-1, colCredit=-1, colPayee=-1, colDesc=-1, colRemarks=-1;
    for(let i=0; i<Math.min(20, rows.length); i++) {
      const cells = (rows[i]||[]).map(c=>String(c==null?"":c).trim().toLowerCase());
      const hasGLAccount = cells.some(c=>c==="gl account");
      const hasPayee = cells.some(c=>c.includes("payee"));
      if(hasGLAccount || hasPayee) {
        headerRowIdx = i;
        colDate    = cells.findIndex(c=>c==="date");
        colDebit   = cells.findIndex(c=>c==="debit");
        colCredit  = cells.findIndex(c=>c==="credit");
        colPayee   = cells.findIndex(c=>c.includes("payee"));
        colDesc    = cells.findIndex(c=>c==="description");
        colRemarks = cells.findIndex(c=>c==="remarks");
        break;
      }
    }
    if(headerRowIdx < 0 || colDate < 0 || colDebit < 0) return null;
    // colCredit may be -1 if the column is absent or uses a non-standard header;
    // treat missing credit as 0 (net = debit) rather than silently reading row[-1].

    // Parse quarter date range from string like "Q1 2026" or "Q4 2025"
    const qMatch = quarterStr.match(/Q(\d)\s+(\d{4})/i);
    if(!qMatch) return null;
    const qNum = parseInt(qMatch[1]);
    const qYear = parseInt(qMatch[2]);
    const qStartMonth = (qNum-1)*3; // 0-indexed month
    const qStart = new Date(qYear, qStartMonth, 1);
    const qEnd   = new Date(qYear, qStartMonth+3, 0, 23, 59, 59, 999);

    // Walk rows, accumulating transactions across ALL Capital Expenditures sections.
    // isAFGLMonthFormat: file is pre-filtered to capex accounts — all rows are capex.
    // Classic format: sections are demarcated by "Capital Expenditures — ..." account headers.
    let inCapexSection = isAFGLMonthFormat; // pre-filtered files start in capex mode
    const vendorMap = new Map(); // vendor → net amount

    for(let i=headerRowIdx+1; i<rows.length; i++) {
      const row = rows[i] || [];
      const col0 = String(row[0]==null?"":row[0]).trim();

      // Section header detection: col A has text, date/debit/credit cols are null
      const noData = row[colDate]==null && row[colDebit]==null && row[colCredit]==null;
      if(col0 && noData) {
        // Always skip pure summary rows — never let them end the section
        if(/^(starting\s*balance|net\s*change|ending\s*balance|total)$/i.test(col0)) continue;
        // In month-grouped AF GL format, "Apr 2025" etc. are grouping headers only — skip without touching inCapexSection
        if(isAFGLMonthFormat && /^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\s+\d{4}$/i.test(col0)) continue;
        // Classic format: GL account section header — toggle capex mode
        if(/capital\s*expend/i.test(col0)) {
          inCapexSection = true; // Enter (or stay in) a capex account — accumulate across all capex accts
        } else if(!isAFGLMonthFormat) {
          inCapexSection = false; // Not a capex account — keep scanning in case more capex accounts appear later
        }
        continue;
      }

      if(!inCapexSection) continue;

      // Parse date — SheetJS cellDates:true returns Date objects for date cells
      const rawDate = row[colDate];
      if(rawDate == null) continue;
      let txDate;
      if(rawDate instanceof Date) {
        txDate = rawDate;
      } else if(typeof rawDate === 'number') {
        txDate = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
      } else {
        txDate = new Date(String(rawDate));
      }
      if(isNaN(txDate.getTime())) continue;

      // Filter to the selected quarter
      if(txDate < qStart || txDate > qEnd) continue;

      const debit  = parseCur(row[colDebit])  || 0;
      const credit = colCredit >= 0 ? (parseCur(row[colCredit]) || 0) : 0;
      const net = debit - credit;
      if(net === 0) continue;

      // Determine the best vendor label for this transaction:
      //   1. Payee/Payer (direct checks — most reliable)
      //   2. Remarks when it's an actual vendor name, not a reclass label
      //   3. Generic "Unit Turn Materials & Labor" for all other journal-entry reclasses
      const payeeVal   = String(colPayee>=0&&row[colPayee]!=null   ? row[colPayee]   : "").trim();
      const remarksVal = String(colRemarks>=0&&row[colRemarks]!=null? row[colRemarks] : "").trim();
      const isReclass  = /^reclass/i.test(remarksVal) || /^switch\b/i.test(remarksVal);
      let vendor;
      if(payeeVal) {
        vendor = payeeVal;
      } else if(remarksVal && !isReclass) {
        vendor = remarksVal; // e.g. "BCS Boiler Chiller Systems", "All Aluminum Window Company"
      } else {
        vendor = "Unit Turn Materials & Labor";
      }

      vendorMap.set(vendor, (vendorMap.get(vendor)||0) + net);
    }

    if(!vendorMap.size) return null;

    const capexItems = [...vendorMap.entries()]
      .filter(([,amt]) => amt > 0)
      .sort((a,b) => b[1]-a[1])
      .map(([name, amount]) => ({name, amount}));

    if(!capexItems.length) return null;
    const totalCapex = capexItems.reduce((s,i)=>s+i.amount, 0);
    return {capexItems, totalCapex};
  } catch(e) {
    console.warn('parseAFCapexGL failed:', e);
    return null;
  }
}
function parseCapexDetail(fileData) {
  if(!fileData) return null;
  try {
    let rawRows = [];
    if(fileData instanceof ArrayBuffer) {
      const wb = XLSX.read(fileData, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    } else {
      // CSV: split into arrays manually so section-header rows are preserved correctly
      rawRows = fileData.split(/\r?\n/).map(line=>{
        const cells=[], re=/("(?:[^"]|"")*"|[^,]*)/g; let m;
        while((m=re.exec(line))!==null && m.index<line.length)
          cells.push(m[1].replace(/^"|"$/g,"").replace(/""/g,'"'));
        return cells;
      });
    }
    if(!rawRows.length) return null;
    // Find the header row (contains "Date", "Name", "Description")
    let colDate=-1, colName=-1, colDesc=-1, colAmount=-1, headerRowIdx=-1;
    for(let i=0; i<Math.min(20,rawRows.length); i++){
      const row = rawRows[i].map(c=>String(c||"").trim().toLowerCase());
      if(row.includes("description") && row.includes("name")){
        headerRowIdx=i;
        colDate  = row.findIndex(c=>c==="date");
        colName  = row.findIndex(c=>c==="name");
        colDesc  = row.findIndex(c=>c==="description");
        colAmount= row.findIndex(c=>c==="amount");
        break;
      }
    }
    if(headerRowIdx<0) return null;

    // Theme classifiers — ordered by specificity. First match wins.
    const THEMES = [
      { name:"Remodels & Renovations",      pat:/\b(remodel|renov|rehab)/i },
      { name:"Unit Turns / Make-Readies",   pat:/(turn\b|make\s*ready|makeready|unit\s*prep|turnkey)/i },
      { name:"Roofing",                     pat:/\broof/i },
      { name:"HVAC",                        pat:/\b(hvac|heat\b|air\s*cond|furnace|ac\s*unit|heating|cooling|thermostat)/i },
      { name:"Plumbing",                    pat:/\b(plumb|pipe|drain|water\s*heater|faucet|toilet|sewer|leak)/i },
      { name:"Electrical",                  pat:/\b(electric|wiring|panel|breaker|outlet|lighting|fixture)/i },
      { name:"Flooring",                    pat:/\b(floor|carpet|vinyl|lvp|laminate|tile|hardwood)/i },
      { name:"Windows & Doors",             pat:/\b(window|door|sliding\s*glass)/i },
      { name:"Cabinetry & Counters",        pat:/\b(cabinet|counter|vanity|backsplash)/i },
      { name:"Appliances",                  pat:/\b(applianc|fridge|refrig|stove|range|oven|microwave|dishwash|washer|dryer)/i },
      { name:"Exteriors & Paint",           pat:/\b(exterior|siding|paint|trim|fascia|stucco|gutter)/i },
      { name:"Landscaping & Grounds",       pat:/\b(landscap|lawn|tree|mulch|shrub|grounds|irrigation|fence)/i },
      { name:"Parking & Pavement",          pat:/\b(parking|pav|asphalt|concrete|lot|curb|sidewalk|striping)/i },
      { name:"Amenities",                   pat:/\b(pool|gym|fitness|clubhouse|playground|amenit|laundry)/i },
      { name:"Security & Safety",           pat:/\b(security|camera|alarm|smoke|detector|sprinkler|lock|keyless)/i },
    ];
    const classify = text => {
      const t = String(text||"");
      for(const th of THEMES){ if(th.pat.test(t)) return th.name; }
      return null;
    };

    const transactions = [];   // all capital-improvement data rows
    const sectionMap  = new Map(); // section → {amount, count}
    const themeMap    = new Map(); // theme   → {amount, count}
    const remodelUnits=[];
    let currentSection = null;
    let inCapitalSection = false;

    for(let i=headerRowIdx+1; i<rawRows.length; i++){
      const row=rawRows[i]||[];
      const col0=String(row[0]||"").trim();
      const col0L=col0.toLowerCase();
      const dateVal = row[colDate>=0?colDate:0];
      const isRealDate = dateVal instanceof Date || typeof dateVal==="number" ||
                         /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(String(dateVal));
      const nameVal  = String(row[colName>=0?colName:3]||"").trim();
      const isSectionRow = col0 && !isRealDate && !nameVal;
      if(isSectionRow){
        if(col0L.startsWith("total for")) { inCapitalSection=false; currentSection=null; }
        else if(/capital\s+(improvements|expenditures|expenses|expend)/i.test(col0)) { inCapitalSection=true; currentSection=col0; }
        else { inCapitalSection=false; currentSection=null; }
        continue;
      }
      if(!inCapitalSection) continue;

      const desc = String(row[colDesc>=0?colDesc:4]||"").replace(/^"|"$/g,"").trim();
      const name = String(row[colName>=0?colName:3]||"").trim();
      const amtRaw = colAmount>=0 ? row[colAmount] : 0;
      const amount = (typeof amtRaw==="number") ? amtRaw
                   : parseCur(String(amtRaw||"").replace(/^"|"$/g,""));
      if(!amount) continue;

      const theme = classify(desc) || classify(name);
      transactions.push({ amount, name, description:desc, section:currentSection||"", theme });

      // Aggregate section / theme totals on positive amounts only
      if(amount>0 && currentSection){
        const s = sectionMap.get(currentSection) || {amount:0,count:0};
        s.amount += amount; s.count += 1;
        sectionMap.set(currentSection, s);
      }
      if(amount>0 && theme){
        const t = themeMap.get(theme) || {amount:0,count:0};
        t.amount += amount; t.count += 1;
        themeMap.set(theme, t);
      }

      // Remodels — preserved for backward compatibility with template narrative
      if(desc.toLowerCase().includes("remodel") || name.toLowerCase().includes("remodel")){
        // Try each common unit-number pattern in turn. Widened beyond the
        // original regex to catch "Apt. 305" (period), "unit-305" (hyphen
        // delimiter), and "Apt:305" (colon).
        const unitM = name.match(/(?:unit|apt(?:artment)?)\s*[\.:#\-]?\s*#?\s*([A-Za-z0-9]+(?:-[A-Za-z0-9]+)?)/i)
                   || name.match(/#\s*([A-Za-z0-9]+(?:-[A-Za-z0-9]+)?)/);
        const unit = unitM ? unitM[1].toUpperCase() : null;
        const key = unit || ("__noid_"+i);
        if(!remodelUnits.find(u=>u.id===key)){
          remodelUnits.push({id:key, label:unit, desc, name});
        }
      }
    }

    const topTransactions = transactions
      .filter(t=>t.amount>0)
      .sort((a,b)=>b.amount - a.amount)
      .slice(0,10)
      .map(t=>({
        amount: Math.round(t.amount),
        name: t.name,
        description: t.description,
        theme: t.theme||null,
      }));
    const themes = [...themeMap.entries()]
      .map(([name,v])=>({ name, amount: Math.round(v.amount), count: v.count }))
      .sort((a,b)=>b.amount - a.amount);
    const sectionTotals = [...sectionMap.entries()]
      .map(([section,v])=>({ section, amount: Math.round(v.amount), count: v.count }))
      .sort((a,b)=>b.amount - a.amount);
    const totalCapex = Math.round(transactions.reduce((s,t)=>s + (t.amount>0?t.amount:0), 0));
    if(totalCapex===0 && transactions.length===0 && rawRows.length>headerRowIdx+1){
      showError("Warning: Capex Detail file was parsed but no capital improvement transactions were found. Verify the file contains a 'Capital Improvements' section and the correct export format is used.");
    }

    const namedUnits = remodelUnits.filter(u=>u.label).map(u=>u.label);
    const unnamedCount = remodelUnits.filter(u=>!u.label).length;
    return {
      remodelCount: remodelUnits.length,
      remodelUnits: namedUnits,
      unnamedCount,
      topTransactions,
      themes,
      sectionTotals,
      totalCapex,
    };
  } catch(e){ return null; }
}

// Reads the "-> Property Name - 123 Street Address" row from an AppFolio rent roll CSV
// and auto-fills state.propertyName if it hasn't been set yet.
function tryAutoFillPropertyName(csvText){
  if(state.propertyName) return; // don't overwrite a name the user already entered
  const lines=(csvText||"").split("\n");
  for(const line of lines){
    const clean=line.replace(/^"|"$/g,"").trim();
    if(!clean.startsWith("->")) continue;
    // Pattern 1 (original): "-> Property Name - 123 Street"
    const m1=clean.match(/^->\s*(.+?)\s*-\s*\d+\s+\S/);
    if(m1){ state.propertyName=m1[1].trim(); render(); return; }
    // Pattern 2: "-> Property Name" with no address, or address without a leading digit
    // Capture everything after "-> " up to the first comma, pipe, or end of meaningful content
    const m2=clean.match(/^->\s*(.+?)(?:\s*[,|].*)?$/);
    if(m2&&m2[1].trim()){ state.propertyName=m2[1].trim(); render(); return; }
  }
}
