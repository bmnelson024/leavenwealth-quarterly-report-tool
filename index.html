<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeavenWealth — Quarterly Report Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, sans-serif; background: #ffffff; color: #1a3a35; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; }
  .subtitle { color: #5a8070; font-size: 14px; margin-top: 4px; }
  .steps { display: flex; margin: 24px 0; }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: #e5e7eb; color: #9ca3af; }
  .step-circle.active { background: #1a3a35; color: white; }
  .step-circle.done { background: #22c55e; color: white; }
  .step-label { font-size: 11px; color: #9ca3af; text-align: center; }
  .step-label.active { color: #1a3a35; font-weight: 600; }
  .section-label { font-size: 12px; font-weight: 700; color: #1a3a35; text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 8px; }
  .file-row { border: 2px dashed #d1d5db; border-radius: 10px; padding: 12px 16px; background: #fafafa; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; transition: all 0.2s; }
  .file-row.done { border-color: #22c55e; background: #f0fdf4; }
  .file-row-label { font-weight: 600; font-size: 13px; }
  .file-badge { margin-left: 6px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .badge-excel { background: #dcfce7; color: #16a34a; }
  .badge-csv { background: #eff6ff; color: #3b82f6; }
  .file-hint { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .upload-btn { background: #1a3a35; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; white-space: nowrap; flex-shrink: 0; border: none; }
  .upload-btn.done { background: #22c55e; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .chart-row { border: 2px dashed #d1d5db; border-radius: 8px; padding: 10px 14px; background: #fafafa; display: flex; align-items: center; justify-content: space-between; gap: 10; margin: 0; transition: all 0.2s; }
  .chart-row.done { border-color: #22c55e; background: #f0fdf4; }
  .chart-label { font-weight: 600; font-size: 12px; }
  .chart-filename { font-size: 10px; color: #9ca3af; margin-top: 1px; font-family: monospace; }
  .chart-thumb { width: 48px; height: 32px; object-fit: cover; border-radius: 4px; border: 1px solid #d1d5db; }
  .econ-box { background: #e6f9f4; border-radius: 10px; padding: 16px; border: 1px solid #c8e6de; margin-bottom: 8px; }
  .econ-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 10px; }
  .econ-input-wrap { display: flex; align-items: center; border: 1px solid #c8e6de; border-radius: 6px; background: white; overflow: hidden; }
  .econ-input { flex: 1; padding: 8px 10px; border: none; outline: none; font-size: 14px; font-family: Inter, sans-serif; }
  .econ-pct { padding: 8px 10px; background: #e6f9f4; color: #5a8070; font-size: 13px; font-weight: 600; }
  .econ-avg { margin-top: 10px; font-size: 12px; color: #2e7d6e; font-weight: 600; }
  .photo-box { background: #e6f9f4; border-radius: 10px; padding: 16px; border: 1px solid #c8e6de; margin-bottom: 8px; }
  .process-btn { margin-top: 12px; width: 100%; padding: 12px 0; border-radius: 8px; border: none; background: #1a3a35; color: white; font-weight: 700; font-size: 15px; cursor: pointer; font-family: Inter, sans-serif; }
  .process-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .error-box { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; color: #dc2626; font-size: 13px; }
  .metric-box { background: #e6f9f4; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .metric-box-title { font-size: 12px; font-weight: 700; color: #1a3a35; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: right; padding: 6px 8px; color: #5a8070; font-weight: 600; border-bottom: 2px solid #c8e6de; }
  th:first-child { text-align: left; }
  td { padding: 8px; border-bottom: 1px solid #c8e6de; }
  td:not(:first-child) { text-align: right; }
  .occ-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .occ-card { background: white; border: 1px solid #c8e6de; border-radius: 8px; padding: 10px 12px; text-align: center; }
  .occ-card.highlight { background: #1a3a35; border-color: #1a3a35; }
  .occ-card-label { font-size: 11px; color: #5a8070; font-weight: 600; }
  .occ-card.highlight .occ-card-label { color: #00c48c; }
  .occ-card-value { font-size: 20px; font-weight: 700; color: #1a3a35; margin-top: 4px; }
  .occ-card.highlight .occ-card-value { color: white; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-card { background: white; border: 1px solid #c8e6de; border-radius: 8px; padding: 10px 14px; }
  .kpi-label { font-size: 11px; color: #5a8070; font-weight: 600; text-transform: uppercase; }
  .kpi-value { font-size: 18px; font-weight: 700; color: #1a3a35; margin-top: 4px; }
  .capex-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #c8e6de; font-size: 13px; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn-back { flex: 1; padding: 10px 0; border-radius: 8px; border: 1px solid #c8e6de; background: white; font-weight: 600; cursor: pointer; font-family: Inter, sans-serif; font-size: 14px; }
  .btn-next { flex: 2; padding: 10px 0; border-radius: 8px; border: none; background: #1a3a35; color: white; font-weight: 700; cursor: pointer; font-family: Inter, sans-serif; font-size: 14px; }
  .narrative-label { font-weight: 600; font-size: 13px; color: #1a3a35; display: block; margin-bottom: 4px; }
  .auto-badge { font-size: 10px; background: #e6f9f4; color: #2e7d6e; padding: 2px 8px; border-radius: 4px; font-weight: 600; float: right; }
  textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #c8e6de; border-radius: 8px; font-size: 13px; font-family: Inter, sans-serif; resize: vertical; box-sizing: border-box; background: #f9fffe; margin-bottom: 14px; }
  .charts-info { background: #e6f9f4; border: 1px solid #c8e6de; border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; color: #1a3a35; }
  .gen-btn { width: 100%; padding: 12px 0; border-radius: 8px; border: none; background: #1a3a35; color: white; font-weight: 700; font-size: 15px; cursor: pointer; font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .gen-btn:disabled { background: #2e7d6e; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .report-ready-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; }
  .print-instructions { background: #e6f9f4; border: 1px solid #c8e6de; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; color: #1a3a35; }
  .print-instructions ol { padding-left: 18px; line-height: 2; margin-top: 6px; }
  iframe { width: 100%; height: 820px; border: 1px solid #c8e6de; border-radius: 8px; }
  .new-quarter-btn { margin-top: 10px; width: 100%; padding: 10px 0; border-radius: 8px; border: none; background: #1a3a35; color: white; font-weight: 700; font-size: 14px; cursor: pointer; font-family: Inter, sans-serif; }
  .home-card { background: white; border: 1px solid #c8e6de; border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s; }
  .home-card:hover { border-color: #1a3a35; }
  .home-prop { font-weight: 700; font-size: 14px; color: #1a3a35; }
  .home-meta { font-size: 12px; color: #5a8070; margin-top: 3px; }
  .home-resume-btn { background: #1a3a35; color: white; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; white-space: nowrap; }
  .home-delete-btn { background: white; color: #dc2626; border: 1px solid #fca5a5; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .save-btn { background: #e6f9f4; color: #2e7d6e; border: 1px solid #c8e6de; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .save-btn:hover { background: #c8e6de; }
  .all-reports-link { font-size: 12px; color: #5a8070; cursor: pointer; text-decoration: underline; margin-bottom: 6px; display: inline-block; }
  .all-reports-link:hover { color: #1a3a35; }
  .btn-home { background: white; color: #1a3a35; border: 1.5px solid #c8e6de; border-radius: 7px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: Inter, sans-serif; }
  .btn-home:hover { border-color: #1a3a35; background: #f0fdf4; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a3a35; color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: 0 4px 12px rgba(26,58,53,0.25); }
  .toast.show { opacity: 1; }
  .save-modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,58,53,0.45); z-index:10000; align-items:center; justify-content:center; }
  .save-modal-overlay.show { display:flex; }
  .save-modal { background:white; border-radius:14px; padding:28px 28px 22px; max-width:360px; width:90%; box-shadow:0 8px 32px rgba(26,58,53,0.22); text-align:center; }
  .save-modal-icon { font-size:32px; margin-bottom:10px; }
  .save-modal h3 { font-size:17px; font-weight:700; color:#1a3a35; margin-bottom:8px; }
  .save-modal p { font-size:13px; color:#5a8070; line-height:1.6; margin-bottom:20px; }
  .save-modal-btns { display:flex; flex-direction:column; gap:8px; }
  .save-modal-btns .btn-save-go { background:#1a3a35; color:white; border:none; border-radius:8px; padding:11px 0; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; }
  .save-modal-btns .btn-skip { background:white; color:#5a8070; border:1px solid #c8e6de; border-radius:8px; padding:9px 0; font-size:13px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; }
  .save-modal-btns .btn-skip:hover { background:#f0fdf4; }
  /* Auth / login overlay */
  #auth-overlay { position:fixed; inset:0; background:#ffffff; z-index:9999; display:flex; align-items:center; justify-content:center; padding:24px; }
  #auth-card { max-width:380px; width:100%; background:white; border:1px solid #e6eeeb; border-radius:12px; padding:28px; box-shadow:0 4px 20px rgba(0,0,0,0.05); }
  #auth-card .auth-logo { height:40px; margin-bottom:20px; }
  #auth-card h2 { font-size:20px; font-weight:700; color:#1a3a35; margin-bottom:6px; }
  #auth-card .auth-subtitle { font-size:13px; color:#5a8070; margin-bottom:22px; }
  #auth-card label { display:block; font-size:12px; font-weight:600; color:#1a3a35; margin-bottom:6px; margin-top:12px; }
  #auth-card input { width:100%; padding:10px 12px; border:1px solid #c8e6de; border-radius:8px; font-size:14px; font-family:Inter,sans-serif; color:#1a3a35; background:white; box-sizing:border-box; }
  #auth-card input:focus { outline:none; border-color:#1a3a35; }
  #auth-card .auth-btn { width:100%; background:#1a3a35; color:white; border:none; border-radius:8px; padding:12px 0; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; margin-top:18px; }
  #auth-card .auth-btn:disabled { opacity:0.6; cursor:not-allowed; }
  #auth-card .auth-toggle { text-align:center; font-size:13px; color:#5a8070; margin-top:14px; }
  #auth-card .auth-toggle a { color:#1a3a35; font-weight:600; text-decoration:none; cursor:pointer; }
  #auth-card .auth-toggle a:hover { text-decoration:underline; }
  #auth-card .auth-msg { margin-top:12px; padding:10px 12px; border-radius:7px; font-size:12px; line-height:1.5; display:none; }
  #auth-card .auth-msg.error { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; display:block; }
  #auth-card .auth-msg.info  { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; display:block; }
  #auth-card .auth-msg.ok    { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; display:block; }
  #user-chip { display:flex; align-items:center; gap:8px; font-size:12px; color:#5a8070; }
  #user-chip .chip-email { font-weight:600; color:#1a3a35; }
  #user-chip button { background:transparent; color:#5a8070; border:1px solid #c8e6de; border-radius:6px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; }
  #user-chip button:hover { background:#f0fdf4; color:#1a3a35; }
  #app-root { display:none; }
  #app-root.ready { display:block; }
</style>
</head>
<body>
<!-- Sign-in / sign-up overlay — covers everything until user is authenticated -->
<div id="auth-overlay">
  <div id="auth-card">
    <img id="auth-logo" class="auth-logo" alt="LeavenWealth"/>
    <h2 id="auth-title">Sign in</h2>
    <div class="auth-subtitle">Quarterly Report Builder · Leaven Wealth team access</div>
    <label for="auth-email">Work email</label>
    <input id="auth-email" type="email" autocomplete="email" placeholder="you@leavenwealth.com"/>
    <label for="auth-password">Password</label>
    <input id="auth-password" type="password" autocomplete="current-password" placeholder="••••••••"/>
    <button id="auth-submit" class="auth-btn" onclick="authSubmit()">Sign in</button>
    <div id="auth-msg" class="auth-msg"></div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">Need an account?</span>
      <a id="auth-toggle-link" onclick="authToggleMode()">Sign up</a>
    </div>
    <div class="auth-toggle" style="margin-top:8px">
      <a id="auth-forgot-link" onclick="authForgotPassword()" style="color:#5a8070;font-weight:500;">Forgot password?</a>
    </div>
  </div>
</div>
<div id="app-root">
<div class="container">
  <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
    <div>
      <h1 style="display:flex;align-items:center;gap:12px;"><img id="lw-header-logo" style="height:40px;width:auto;" alt="LeavenWealth"/><span>Quarterly Report Builder</span></h1>
      <div class="subtitle">LeavenWealth Quarterly Report Tool</div>
    </div>
    <div id="user-chip" style="display:none;">
      <span>Signed in as <span class="chip-email" id="user-chip-email"></span></span>
      <button onclick="authSignOut()">Sign out</button>
    </div>
  </div>
  <div id="home-link"></div>
  <div class="steps" id="steps-indicator"></div>
  <div id="error-box" class="error-box" style="display:none"></div>
  <div id="step-content"></div>
</div>
</div><!-- /#app-root -->

// Returns all known equivalent names for a property (always includes the name
// itself). Used to expand comparisons through the alias table.
function getPropertyAliases(name){
  if(!name) return [];
  const n=String(name).toLowerCase().trim();
  const grp=PROPERTY_ALIASES.find(g=>g.some(a=>a.toLowerCase().trim()===n));
  return grp||[String(name)];
}

// Escape any string before it is interpolated into innerHTML. Every user-
// supplied string (property names, investment name, save labels, narratives,
// imported filenames, etc.) must go through this before being spliced into a
// template literal that becomes innerHTML.
function escapeHtml(s){

// Pull every persisted row out of Supabase into _dbCache, then derive the
// saves index locally. Called on login / page reload after auth succeeds.
async function supaBootstrap(){
  // Wipe any stale cache from a prior user on this browser before loading.
  for(const k of Object.keys(_dbCache)) delete _dbCache[k];
  const pageSize = 1000;
  let from = 0;
  while(true){
    const { data, error } = await sb
      .from(STORE_TABLE)
      .select("key,value")
      .range(from, from + pageSize - 1);
    if(error) throw error;
    if(!data || data.length === 0) break;
    for(const row of data) _dbCache[row.key] = row.value;
    if(data.length < pageSize) break;

  // home screen can list everyone's reports even if a teammate saved while
  // you were offline.
  const idx = [];

    if(!k.startsWith(SAVE_PREFIX)) continue;

      const d = JSON.parse(_dbCache[k]);
      if(!d) continue;

        propertyName: (d.source === 'investment' ? d.investmentName : d.propertyName) || d.propertyName || d.investmentName || "Unknown",

function restoreBackup(){

  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        // Validate schema: must be a plain object of string keys → string values.
        // Rejects arrays, null, nested objects, and malformed payloads that could
        // otherwise poison the cache with arbitrary data.
        if(!data || typeof data !== 'object' || Array.isArray(data)){
          showError('Backup file format not recognized — expected a JSON object of saved keys.');
          return;
        }
        const ALLOWED_PREFIXES=[SAVE_PREFIX,CHARTS_PREFIX,INV_CHARTS_PREFIX,FILES_PREFIX,INV_FILES_PREFIX,'lw_photo_','lw_assetfacts_',BG_CHAMPION_CHARTS_PREFIX];
        const ALLOWED_EXACT=new Set([SAVES_INDEX_KEY]);
        const entries=Object.entries(data);
        const bad=[];
        for(const [k,v] of entries){
          if(typeof k !== 'string' || typeof v !== 'string'){ bad.push(k); continue; }
          if(k.length > 512){ bad.push(k); continue; }
          if(v.length > 20*1024*1024){ bad.push(k+" (too large)"); continue; } // 20MB per value cap
          const ok = ALLOWED_EXACT.has(k) || ALLOWED_PREFIXES.some(p=>k.startsWith(p));
          if(!ok) bad.push(k);
        }
        if(bad.length){
          showError('Backup contains '+bad.length+' unrecognized or invalid entr'+(bad.length>1?'ies':'y')+' — refusing to restore. First few: '+bad.slice(0,3).join(', '));
          return;
        }
        // Update local cache immediately
        dbKeys().forEach(k=>{ delete _dbCache[k]; });
        entries.forEach(([k,v])=>{ _dbCache[k]=v; });
        // Bulk-write to Supabase in batches of 50, then confirm
        const toUpsert=entries
          .filter(([k])=>!_isCacheOnlyKey(k))
          .map(([k,v])=>({key:k,value:v,updated_at:new Date().toISOString(),...(_currentUser&&_currentUser.id?{updated_by:_currentUser.id}:{})}));
        const BATCH=50;
        const batches=[];
        for(let i=0;i<toUpsert.length;i+=BATCH) batches.push(toUpsert.slice(i,i+BATCH));
        showToast('Saving to cloud… do not close this tab');
        Promise.all(batches.map(b=>sb.from(STORE_TABLE).upsert(b)))
          .then(results=>{
            const errs=results.filter(r=>r.error);
            if(errs.length){
              console.warn('Restore: '+errs.length+' batch(es) failed',errs);
              showError('Backup loaded into memory but some items may not have synced to cloud. Try again on a stable connection.');
            } else {

            }
            state.showHome=true;render();
          })
          .catch(err=>{
            console.warn('Restore bulk upsert failed:',err);
            showError('Backup loaded into memory but could not sync to cloud: '+(err&&err.message||err));
            state.showHome=true;render();
          });
      }catch(e2){showError('Could not read backup file: '+e2.message);}
    };

  };

}

function _hashFileSet(filesOrProps, isInv){

// Converts an Excel ArrayBuffer to CSV text using XLSX.js.
// AppFolio (and Buildium) Excel exports start with 8-10 metadata rows before the real
// column headers. This function finds the first row with >= 3 non-empty cells (the true
// header row) and emits CSV from there onward — so parseDelim / skipMetaRows see a clean file.
const xlsxToText = buffer => {
  try {
    const wb = XLSX.read(buffer, {type:"array", cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    // raw:false → dates and numbers returned as formatted strings; easier for parseDelim
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:"", raw:false});
    // Find the first row that looks like a real header (>= 3 non-empty cells)
    let startIdx = 0;
    for(let i = 0; i < Math.min(20, rows.length); i++){
      if(rows[i].filter(c => String(c||"").trim() !== "").length >= 3){ startIdx = i; break; }

    // Serialize to CSV from the header row onward, quoting cells that contain commas/quotes

      row.map(c => {

// parseDelim: RFC 4180-style CSV / TSV parser.
// Critical property: a newline that appears INSIDE a quoted cell is treated as
// data, not a record separator. Buildium exports have multi-line cells like
// "$1001.00\n265 days\n7/9/2025" in the Last Payment column — the old
// line-first splitter fragmented ~85% of detail rows on those files.
// Quote-awareness is only applied to comma-delimited input; TSV stays simple.
const parseDelim = text => {
  if(!text || typeof text !== 'string') return [];
  // Strip UTF-8 BOM (Excel's default encoding for CSV exports) before anything else.
  // Modern String.prototype.trim() handles U+FEFF as whitespace, but relying on that
  // is fragile — an explicit strip keeps header/value lookups robust across runtimes.
  const norm = text.replace(/^\uFEFF/, "").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  // Sniff delimiter from the first physical line (up to ~4KB).
  const sniff = norm.slice(0, 4000);
  const firstNewline = sniff.indexOf("\n");
  const firstLine = firstNewline >= 0 ? sniff.slice(0, firstNewline) : sniff;
  const delim = (firstLine.match(/\t/g)||[]).length >= (firstLine.match(/,/g)||[]).length ? "\t" : ",";
  const quoteAware = delim === ",";
  const records = [];
  let cur = [], field = "", q = false;
  for(let i = 0; i < norm.length; i++){
    const ch = norm[i];
    if(quoteAware && ch === '"'){
      // "" inside a quoted field = literal quote
      if(q && norm[i+1] === '"'){ field += '"'; i++; continue; }
      q = !q; continue;
    }
    if(!q && ch === delim){ cur.push(field); field = ""; continue; }
    if(!q && ch === "\n"){ cur.push(field); records.push(cur); cur = []; field = ""; continue; }
    field += ch;
  }
  // Flush any trailing field/record.
  if(field.length > 0 || cur.length > 0){ cur.push(field); records.push(cur); }
  // Drop entirely-blank records (preserves old behavior of filtering empty lines).
  const clean = records.filter(r => r.some(c => String(c||"").trim() !== ""));
  if(!clean.length) return [];
  const headers = clean[0].map(h => h.trim().replace(/^"|"$/g,""));
  return clean.slice(1).map(r => Object.fromEntries(
    headers.map((h,i) => [h, ((r[i]||"")+"").trim().replace(/^"|"$/g,"")])
  ));
};
// parseBuildiumDelinquency: totals the Buildium "Delinquent Tenants" report.
// Modern Buildium exports use a "Total" column with a "Grand total for all
// properties" summary row; older exports used "Balance". This helper prefers
// the authoritative grand-total row when present, falls back to summing detail
// rows (skipping subtotal/summary rows), and tolerates both header styles so
// future format tweaks don't silently zero out delinquency again.

    || headers.find(k => /^total\s*balance$/i.test(k.trim()))
    || headers.find(k => /^balance(\s*due)?$/i.test(k.trim()))
    || headers.find(k => /^amount\s*(due|receivable)$/i.test(k.trim()))
    || "Balance";
  if(!headers.includes(balanceKey)){
    showError("Warning: Delinquency file column not found — verify the Buildium 'Delinquency As Of' export format. Delinquency may show as $0.");
    return 0;
  }

  const firstVal = r => String(r[firstCol] || "").trim();

  // "Grand total for all properties"; AppFolio-style exports often emit a
  // bare "Total" as the final row — either should be used verbatim instead

  const grand = rows.find(r => /^grand\s+total\b/i.test(firstVal(r)))

  // don't align with the detail header and would otherwise contaminate the sum.
  let total = 0;
  for (const r of rows) {

// Robust date parser: handles ISO, MM/DD/YYYY, DD-MON-YYYY (e.g. 01-JAN-2026), YYYY/MM/DD.
const parseDate = str => {
  if (!str || !str.trim()) return null;
  // Try native parse first (handles ISO 8601, MM/DD/YYYY, "Jan 1 2026", etc.)
  let d = new Date(str);
  if (!isNaN(d)) return d;
  // Try DD-MON-YYYY or DD/MON/YYYY (e.g. 01-JAN-2026)
  const alphaMonth = str.match(/^(\d{1,2})[\/\-]([A-Za-z]{3,9})[\/\-](\d{4})$/);
  if (alphaMonth) {
    const MO = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mo = MO[alphaMonth[2].toLowerCase().slice(0,3)];
    const day = parseInt(alphaMonth[1]);
    if (mo !== undefined && day >= 1 && day <= 31) {
      d = new Date(parseInt(alphaMonth[3]), mo, day);
      if (!isNaN(d) && d.getMonth() === mo) return d;
    }
  }
  // Try YYYY/MM/DD — validate month/day to prevent silent JS Date wrapping
  // (e.g. "2025/13/15" would otherwise become Jan 15, 2026).
  const ymd = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (ymd) {
    const m = parseInt(ymd[2]);
    const day = parseInt(ymd[3]);
    if (m >= 1 && m <= 12 && day >= 1 && day <= 31) {
      d = new Date(parseInt(ymd[1]), m-1, day);
      if (!isNaN(d) && d.getMonth() === m-1) return d;
    }
  }
  return null;
};

const getUnitId = r => {

// "Unit 1810 - Something" → "1810", "1810 - 2BR/1BA" → "1810",
// "APT 2A" → "2a", "1810" → "1810"
function normUnitKey(raw){
  const s=String(raw||"").trim();
  // Strip known prefix words first
  const stripped=s.replace(/^(?:unit|apt|apartment|suite|ste|#)\s*[#\-]?\s*/i,'').trim();

  // Using 28 to stay safely within one printed page per chunk.

  // Pass 1: drop any non-total, non-section-header row whose quarter amount is null (zero).
  // Pass 2: drop section headers that have no visible (non-null, non-total) children before the next header.
  // Grand totals are always kept even if zero (e.g. edge-case empty quarter).
  // Sub-totals like "Total for Lease Violation" are dropped when their amount is zero.
  const GRAND_TOTAL_LABELS = new Set(["total operating income","total income","total operating expense","total operating expenses","total expenses","noi - net operating income","net operating income","net income"]);
  const filterIncomeRows = rows => {
    const pass1 = rows.filter(r => {
      if (r.isSectionHeader) return true;
      if (r.amount !== null) return true;
      // Always keep grand totals regardless of amount
      return GRAND_TOTAL_LABELS.has(r.label.toLowerCase().trim());
    });
    // Pass 2: drop section headers with no visible children
    return pass1.filter((r, i) => {
      if (!r.isSectionHeader) return true;
      for (let j = i + 1; j < pass1.length; j++) {

  { key:"inv_income_by_property",   match:"operating income by property" },
  { key:"inv_expense_by_property",  match:"operating expense by property" },
  { key:"inv_noi_by_property",      match:"noi by property" },

function loadInvPropertyFile(propId,key,asBuffer){
  const inp=document.createElement("input"); inp.type="file";
  inp.accept=(asBuffer==='auto'||asBuffer==='text')?".xlsx,.xls,.csv,.tsv,.txt":asBuffer?".xlsx,.xls":".csv,.tsv,.txt";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const isXL=["xlsx","xls"].includes(f.name.split(".").pop().toLowerCase());
    const onFail=()=>showError("Could not read \""+f.name+"\". The file may be corrupt or inaccessible.");
    if(asBuffer==='text' && isXL){
      const r=new FileReader();
      r.onload=ev=>{const prop=state.invProperties.find(p=>p.id===propId);if(prop){prop.files[key]=xlsxToText(ev.target.result);render();}};
      r.onerror=onFail;
      r.readAsArrayBuffer(f);
    } else {
      // Resolve read mode (same rationale as loadFile — avoid truthy-string bug).
      let useBuffer;
      if(asBuffer==='auto') useBuffer=isXL;
      else if(asBuffer==='text') useBuffer=false;
      else useBuffer=!!asBuffer;
      const r=new FileReader();
      r.onload=ev=>{const prop=state.invProperties.find(p=>p.id===propId);if(prop){prop.files[key]=ev.target.result;render();}};
      r.onerror=onFail;
      useBuffer?r.readAsArrayBuffer(f):r.readAsText(f);
    }
  }; inp.click();
}
function loadInvChart(key){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".png,.jpg,.jpeg";
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{state.invCharts[key]=ev.target.result;saveInvChartsForKey(currentSaveKey(),state.invCharts);render();};
    r.onerror=()=>showError("Could not read \""+f.name+"\". The file may be corrupt or inaccessible.");
    r.readAsDataURL(f);
  };
  inp.click();
}
function loadAllInvCharts(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".png,.jpg,.jpeg"; inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    let matched=0,unmatched=[],failed=[],pending=files.length;
    files.forEach(f=>{
      const name=f.name.replace(/\.[^.]+$/,"").toLowerCase().trim();
      const rule=INV_CHART_MAP.find(r=>name.includes(r.match));
      if(!rule){unmatched.push(f.name);pending--;if(pending===0)afterLoad(matched,unmatched);return;}
      const r=new FileReader();
      r.onload=ev=>{state.invCharts[rule.key]=ev.target.result;matched++;pending--;if(pending===0)afterLoad(matched,unmatched);};
      r.onerror=()=>{failed.push(f.name);pending--;if(pending===0)afterLoad(matched,unmatched);};
      r.readAsDataURL(f);
    });
    function afterLoad(m,u){
      saveInvChartsForKey(currentSaveKey(),state.invCharts);
      render();
      const msgs=[];
      if(u.length>0) msgs.push("Could not match "+u.length+" file(s): "+u.join(", ")+".");
      if(failed.length>0) msgs.push("Failed to read "+failed.length+" file(s): "+failed.join(", ")+".");
      showError(msgs.join(" "));
    }
  }; inp.click();
}

      try { parsed=parseAFCapexGL(raw, state.currentQuarter||""); } catch(_){}
      if(parsed&&parsed.totalCapex){
        // Normalise AppFolio result
        const items=(parsed.capexItems||[]).map(i=>({name:i.name||i.label||"",amount:i.total||i.amount||0})).filter(i=>i.amount>0).sort((a,b)=>b.amount-a.amount);
        parsed={totalCapex:parsed.totalCapex, items, remodels:null, remodelsCount:0};
      } else {
        // Try Business Plan-specific Buildium parser
        parsed=null;
        try { parsed=parseBpCapexBuildium(raw); } catch(_){}
        if(!parsed||!parsed.totalCapex) parsed=null;
      }
      if(!parsed||!parsed.totalCapex){
        showError("Could not parse capital expense totals from this file. Supported formats: AppFolio General Ledger or Buildium Transaction Detail by Account.");
        return;
      }
      const items=(parsed.items||[]).filter(i=>i.amount>0).sort((a,b)=>b.amount-a.amount);
      state.businessPlan.spentToDate=String(Math.round(parsed.totalCapex));
      const rc=parsed.remodelsCount||0;
      if(rc>0){
        state.businessPlan.unitsCompleted=String(rc);
        // Auto-fill Units Remaining = total units from rent rolls minus completed
        const totalU=(state.invMetrics&&state.invMetrics.totalUnits)||0;
        if(totalU>rc) state.businessPlan.unitsRemaining=String(totalU-rc);
      }
      state.businessPlan.bpCapexParsed={
        itemCount:items.length, items,
        remodels:parsed.remodels||null,
        remodelsCount:rc,
        totalAllCapex:parsed.totalAllCapex||0
      };
      render();
    };
    if(isXL) r.readAsArrayBuffer(f); else r.readAsText(f);
  }; inp.click();
}

// parseBpCapexBuildium: Business Plan parser for Buildium "Transaction Detail by Account".
//
// A unit is counted as remodeled ONLY when it appears in
// "Capital Improvements - Labor - General" with a Description containing
// "Remodel", "Make Ready", or "Make-Ready".
//
// For each qualifying unit, total cost = sum of all its positive charges across:
//   Labor - General, Appliance, Blinds, Carpet, Flooring - Material,
//   Materials - General, Paint - Material
//
// totalCapex = all positive charges across every Capital Improvements section
// (used to populate the "Spent to Date" field).
function parseBpCapexBuildium(fileData){
  if(!fileData) return null;
  try{
    let rawRows=[];
    if(fileData instanceof ArrayBuffer){
      const wb=XLSX.read(fileData,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rawRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    } else {
      rawRows=fileData.split(/\r?\n/).map(line=>{
        const cells=[],re=/("(?:[^"]|"")*"|[^,]*)/g;let m;
        while((m=re.exec(line))!==null&&m.index<line.length)
          cells.push(m[1].replace(/^"|"$/g,"").replace(/""/g,'"'));
        return cells;
      });
    }
    if(!rawRows.length) return null;

    // Find header row
    let colDate=-1,colName=-1,colDesc=-1,colAmount=-1,colProp=-1,hdr=-1;
    for(let i=0;i<Math.min(20,rawRows.length);i++){
      const row=rawRows[i].map(c=>String(c||"").trim().toLowerCase());
      if(row.includes("description")&&row.includes("name")){
        hdr=i;
        colDate  =row.findIndex(c=>c==="date");
        colName  =row.findIndex(c=>c==="name");
        colDesc  =row.findIndex(c=>c==="description");
        colAmount=row.findIndex(c=>c==="amount");
        colProp  =row.findIndex(c=>c==="property or company"||c==="property");
        break;
      }
    }
    if(hdr<0) return null;

    const TRIGGER_LC  = "capital improvements - labor - general";
    const COST_LC = new Set([
      "capital improvements - labor - general",
      "capital improvements - appliance",
      "capital improvements - blinds",
      "capital improvements - carpet",
      "capital improvements - flooring - material",
      "capital improvements - materials - general",
      "capital improvements - paint - material",
    ]);
    const REMODEL_RE = /remodel|make[\s-]ready/i;

    // Extract "Unit XXXX" from Name column
    function unitNum(name){
      const m=String(name||"").match(/^[Uu]nit\s+(\d+)\s*(?:-|–|—)/);
      return m?m[1]:null;
    }

    // Single pass: collect by section, track all capex total
    const bySection={}; // sectionLC → [{unit,prop,amount,desc}]
    let curSection=null,curLC=null,inCap=false,capTotal=0;

    for(let i=hdr+1;i<rawRows.length;i++){
      const row=rawRows[i]||[];
      const col0=String(row[0]||"").trim();
      const col0L=col0.toLowerCase();
      // Skip summary/balance rows by scanning EVERY cell — Buildium Excel exports
      // often put "Total for..." in a column other than the first, so checking
      // only col0 misses them and their subtotals get double-counted.
      const SUMMARY_RE=/^(total\b|grand total|net\s+change|ending\s+bal|opening\s+bal|beginning\s+bal)/i;
      if(row.some(c=>SUMMARY_RE.test(String(c||"").trim()))) continue;
      const dateVal=row[colDate>=0?colDate:0];
      const isDate=dateVal instanceof Date||typeof dateVal==="number"||/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(String(dateVal));
      const nameVal=String(row[colName>=0?colName:3]||"").trim();
      const isSec=col0&&!isDate&&!nameVal;

      if(isSec){
        if(col0L.startsWith("capital improvements")){curSection=col0;curLC=col0L;inCap=true;}
        else{curSection=null;curLC=null;inCap=false;}
        continue;
      }
      if(!inCap||!curSection) continue;

      const amtRaw=colAmount>=0?row[colAmount]:0;
      const amt=typeof amtRaw==="number"?amtRaw:parseCur(String(amtRaw||"").replace(/^"|"$/g,""));
      if(!amt||!Number.isFinite(amt)) continue; // skip zero/NaN but keep negatives (returns/credits)

      capTotal+=amt; // net total: positives minus returns
      if(amt>0&&COST_LC.has(curLC)){ // per-unit attribution: positive charges only
        if(!bySection[curLC]) bySection[curLC]=[];
        bySection[curLC].push({
          unit:unitNum(nameVal),
          prop:String(row[colProp>=0?colProp:2]||"").trim(),
          amount:amt,
          desc:String(row[colDesc>=0?colDesc:4]||"").replace(/^"|"$/g,"").trim()
        });
      }
    }

    // Identify remodeled units
    const laborRows=bySection[TRIGGER_LC]||[];
    const qualified=new Set();
    laborRows.forEach(r=>{ if(r.unit&&REMODEL_RE.test(r.desc)) qualified.add(r.unit); });

    // Per-unit cost aggregation
    const FIELD_MAP={
      "capital improvements - labor - general":       "laborCost",
      "capital improvements - appliance":             "applianceCost",
      "capital improvements - blinds":                "blindsCost",
      "capital improvements - carpet":                "carpetCost",
      "capital improvements - flooring - material":   "flooringCost",
      "capital improvements - materials - general":   "materialsCost",
      "capital improvements - paint - material":      "paintCost",
    };
    const unitMap={};
    qualified.forEach(u=>{
      unitMap[u]={unit:u,property:"",laborCost:0,applianceCost:0,blindsCost:0,carpetCost:0,flooringCost:0,materialsCost:0,paintCost:0,totalCost:0};
    });
    Object.entries(bySection).forEach(([lc,rows])=>{
      const field=FIELD_MAP[lc]; if(!field) return;
      rows.forEach(r=>{
        if(!r.unit||!qualified.has(r.unit)) return;
        const u=unitMap[r.unit];
        u[field]+=r.amount; u.totalCost+=r.amount;
        if(r.prop&&!u.property) u.property=r.prop;
      });
    });

    const remodels=Object.values(unitMap)
      .filter(u=>u.totalCost>0)
      .sort((a,b)=>parseInt(a.unit)-parseInt(b.unit))
      .map(u=>({...u,totalCost:Math.round(u.totalCost*100)/100}));

    // Section totals for line-item display
    const SEC_LABELS={
      "capital improvements - labor - general":       "Labor",
      "capital improvements - appliance":             "Appliances",
      "capital improvements - blinds":                "Blinds",
      "capital improvements - carpet":                "Carpet",
      "capital improvements - flooring - material":   "Flooring",
      "capital improvements - materials - general":   "Materials",
      "capital improvements - paint - material":      "Paint",
    };
    const items=Object.entries(bySection)
      .filter(([k])=>SEC_LABELS[k])
      .map(([k,rows])=>({name:SEC_LABELS[k],amount:Math.round(rows.reduce((s,r)=>s+r.amount,0))}))
      .filter(i=>i.amount>0)
      .sort((a,b)=>b.amount-a.amount);

    // totalCapex = only the costs attributable to remodeled units across the 7 tracked categories
    // totalAllCapex = every capital improvement charge in the file (for context / "other capex")
    const remodelsTotal=Math.round(remodels.reduce((s,u)=>s+u.totalCost,0));
    console.log("[BpCapex] remodelsTotal:",remodelsTotal,"totalAllCapex:",Math.round(capTotal),"remodels:",remodels.length);
    return{totalCapex:remodelsTotal,totalAllCapex:Math.round(capTotal),remodels,remodelsCount:remodels.length,items,itemCount:items.length};
  }catch(e){console.warn("parseBpCapexBuildium failed:",e);return null;}
}

// uploadBpLaunchRent: imports one or more rent rolls from the time of purchase
// (AppFolio or Buildium format) and calculates avg rent per occupied unit.
// Auto-fills state.businessPlan.launchRentPerUnit; manual field stays editable.
function uploadBpLaunchRent(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".xlsx,.xls,.csv,.tsv,.txt"; inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    let totalRent=0, totalOccUnits=0, done=0, failed=[], mergedUnitRents={};

    function tryExtract(raw, isBuffer){
      let rows=[];
      if(isBuffer){
        try{
          const wb=XLSX.read(raw,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          // Read as raw arrays first so we can find the actual header row
          // (Buildium rent rolls have 4 metadata rows before the real header)
          const rawArrays=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          let headerRowIdx=-1;
          for(let i=0;i<Math.min(15,rawArrays.length);i++){
            const rowLower=rawArrays[i].map(c=>String(c||"").trim().toLowerCase());
            if(rowLower.includes("unit")&&rowLower.includes("rent")){headerRowIdx=i;break;}
          }
          if(headerRowIdx<0) return null;
          const headers=rawArrays[headerRowIdx].map(c=>String(c||"").trim());
          rows=rawArrays.slice(headerRowIdx+1).map(arr=>{
            const obj={};
            headers.forEach((h,i)=>{obj[h]=arr[i]===undefined||arr[i]===null?"":arr[i];});
            return obj;
          });
        }catch(_){ return null; }
        // Filter: try Buildium pattern first, fall back to AppFolio
        const bdRows=rows.filter(isBuildiumUnitRow);
        if(bdRows.length>0) rows=bdRows;
        else rows=rows.filter(r=>{const u=String(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u)&&!/^->/.test(u);});
      } else {
        // Text: try Buildium (needs skipMetaRows) first
        const bdRows=parseDelim(skipMetaRows(raw||"")).filter(isBuildiumUnitRow);
        if(bdRows.length>0) rows=bdRows;
        else rows=parseDelim(raw||"").filter(r=>{const u=(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u)&&!/^->/.test(u)&&!/^\d+\s*(bed|bath|br|ba)\b/i.test(u);});
      }
      if(!rows.length) return null;
      let rent=0, occ=0;
      const unitRents={};
      rows.forEach(r=>{
        if(!getVacantFlag(r)){
          const rv=parseCur(r["Rent"]||r["Monthly Rent"]||r["Actual Rent"]||r["ActualRent"]||0);
          if(rv>0){
            rent+=rv; occ++;
            // Store per-unit rent using normalized unit key
            const rawUnit=String(r["Unit"]||r["unit"]||"").trim();
            const normU=normUnitKey(rawUnit);
            if(normU) unitRents[normU]=rv;
          }
        }
      });
      return occ>0?{rent,occ,unitRents}:null;
    }

    function afterAll(){
      if(totalOccUnits===0){
        showError("Could not extract rent data from the uploaded file(s). Expected AppFolio or Buildium rent roll format."+(failed.length?" Failed: "+failed.join(", "):""));
        return;
      }
      const avg=Math.round(totalRent/totalOccUnits);
      state.businessPlan.launchRentPerUnit=String(avg);
      state.businessPlan.bpLaunchRentParsed={avgRent:avg,totalRent,occUnits:totalOccUnits,fileCount:files.length-failed.length,unitRents:mergedUnitRents};
      render();
      if(failed.length) showError("Could not parse "+failed.length+" file(s): "+failed.join(", "));
    }

    files.forEach(f=>{
      const isXL=/\.(xlsx|xls)$/i.test(f.name);
      const r=new FileReader();
      r.onload=ev=>{
        const res=tryExtract(ev.target.result,isXL);
        if(!res) failed.push(f.name);
        else{totalRent+=res.rent;totalOccUnits+=res.occ;Object.assign(mergedUnitRents,res.unitRents||{});}
        if(++done===files.length) afterAll();
      };
      r.onerror=()=>{failed.push(f.name);if(++done===files.length) afterAll();};
      if(isXL) r.readAsArrayBuffer(f); else r.readAsText(f);
    });
  }; inp.click();
}

// uploadBpCurrentRent: imports current-quarter rent roll(s) and extracts
// per-unit current rents for the Business Plan ROI section.
function uploadBpCurrentRent(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".xlsx,.xls,.csv,.tsv,.txt"; inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    let totalRent=0, totalOccUnits=0, done=0, failed=[], mergedUnitRents={};
    files.forEach(f=>{
      const isXL=/\.(xlsx|xls)$/i.test(f.name);
      const r=new FileReader();
      r.onload=ev=>{
        const raw=ev.target.result;
        let rows=[];
        if(isXL){
          try{
            const wb=XLSX.read(raw,{type:"array"});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const rawArrays=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
            let hi=-1;
            for(let i=0;i<Math.min(15,rawArrays.length);i++){
              const rl=rawArrays[i].map(c=>String(c||"").trim().toLowerCase());
              if(rl.includes("unit")&&rl.includes("rent")){hi=i;break;}
            }
            if(hi<0){failed.push(f.name);if(++done===files.length)afterAll();return;}
            const headers=rawArrays[hi].map(c=>String(c||"").trim());
            rows=rawArrays.slice(hi+1).map(arr=>{const o={};headers.forEach((h,i)=>{o[h]=arr[i]===undefined?"":arr[i];});return o;});
            const bdRows=rows.filter(isBuildiumUnitRow);
            if(bdRows.length>0) rows=bdRows;
            else rows=rows.filter(r=>{const u=String(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u)&&!/^->/.test(u);});
          }catch(_){failed.push(f.name);if(++done===files.length)afterAll();return;}
        } else {
          const bdRows=parseDelim(skipMetaRows(raw||"")).filter(isBuildiumUnitRow);
          if(bdRows.length>0) rows=bdRows;
          else rows=parseDelim(raw||"").filter(r=>{const u=(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u)&&!/^->/.test(u)&&!/^\d+\s*(bed|bath|br|ba)\b/i.test(u);});
        }
        if(!rows.length){failed.push(f.name);if(++done===files.length)afterAll();return;}
        let rent=0,occ=0;
        rows.forEach(r=>{
          if(!getVacantFlag(r)){
            const rv=parseCur(r["Rent"]||r["Monthly Rent"]||r["Actual Rent"]||r["ActualRent"]||0);
            if(rv>0){
              rent+=rv; occ++;
              const normU=normUnitKey(String(r["Unit"]||r["unit"]||"").trim());
              if(normU) mergedUnitRents[normU]=rv;
            }
          }
        });
        totalRent+=rent; totalOccUnits+=occ;
        if(++done===files.length) afterAll();
      };
      r.onerror=()=>{failed.push(f.name);if(++done===files.length)afterAll();};
      if(isXL) r.readAsArrayBuffer(f); else r.readAsText(f);
    });
    function afterAll(){
      if(totalOccUnits===0){
        showError("Could not extract rent data. Expected AppFolio or Buildium rent roll format."+(failed.length?" Failed: "+failed.join(", "):""));
        return;
      }
      const avg=Math.round(totalRent/totalOccUnits);
      state.businessPlan.bpCurrentRentParsed={avgRent:avg,totalRent,occUnits:totalOccUnits,fileCount:files.length-failed.length,unitRents:mergedUnitRents};
      // Also push into invMetrics so the aggregate display stays in sync
      if(state.invMetrics) state.invMetrics.unitCurrentRents=mergedUnitRents;
      render();
    }
  }; inp.click();
}

function parsePropertyMetrics(prop){
  // Income statement is optional per property — aligns with single-property
  // mode. If missing, all financial fields stay at zero and the property
  // still contributes rent-roll / leasing / capex data to the portfolio rollup.
  let totalIncome=0, totalExpense=0, noi=0, capex=0;
  let capexItems=[], _propIncomeRows=[];
  if(prop.files.income){
    let parsed = null;
    if(prop.source==='appfolio'){
      parsed = parseQuarterFromExcel(prop.files.income, state.currentQuarter);
      if(!parsed){
        showError("Warning: Could not find "+state.currentQuarter+" columns in income statement for \""+prop.name+"\" — using annual totals instead, which may be ~4× higher than quarterly figures. Verify the file is a trailing 12-month export and the quarter is set correctly.");
        try{parsed=parseExcel(prop.files.income);}catch(e){parsed=null;}
      }
    } else {
      parsed = state.currentQuarter ? parseQuarterFromExcel(prop.files.income, state.currentQuarter) : null;
      if(!parsed){
        if(state.currentQuarter) showError("Warning: Could not find "+state.currentQuarter+" columns in income statement for \""+prop.name+"\" — using annual totals instead, which may be ~4× higher than quarterly figures. Verify the file is a trailing 12-month export and the quarter is set correctly.");
        try{parsed=parseExcel(prop.files.income);}catch(e){parsed=null;}
      }
    }
    if(parsed){
      ({totalIncome, totalExpense, noi, capex, capexItems, incomeRows:_propIncomeRows} = parsed);
      if(!totalIncome && !totalExpense){
        showError("Warning: Income statement for \""+prop.name+"\" parsed but contained no totals. Verify the file format.");
      }
    } else {
      showError("Warning: Could not parse Income Statement for \""+prop.name+"\". Income / expense / NOI for that property will be $0.");
    }
  }
  const propExpenseCats = extractExpenseCats(_propIncomeRows||[]);
  // cashOnHand no longer derived from bank/trial-balance files (those slots
  // were removed). Investment reports don't display per-property cash on
  // hand, and imported single-property saves preserve their own value via
  // the _imported path in processInvestmentData.
  let occ1=0,occ2=0,occ3=0,mkt=0,act=0,delinquency=0,newLeases=0,renewals=0,inquiries=0,applications=0,cashOnHand=0;
  if(prop.source==='appfolio'){
    occ1=calcOccAppFolio(prop.files.rr1); occ2=calcOccAppFolio(prop.files.rr2); occ3=calcOccAppFolio(prop.files.rr3);
    const fr=parseDelim(prop.files.rr3||"").filter(r=>{const u=(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u);});
    fr.forEach(r=>{if(!getVacantFlag(r)){mkt+=parseCur(r["Market Rent"]||r["MarketRent"]||r["Mkt Rent"]||0);act+=parseCur(r["Rent"]||0);}});
    const dr=parseDelim(prop.files.delinquency||"");
    const dt=dr.find(r=>/^total$/i.test((r["Unit"]||r["Name"]||"").trim()));
    if(dt){delinquency=parseCur(dt["Amount Receivable"]||0);}else{dr.forEach(r=>{const a=parseCur(r["Amount Receivable"]||0);if(a>0)delinquency+=a;});}
    if(!prop.files.leasingSummary && !prop.files.leasing) showError("Warning: No leasing file uploaded for \""+prop.name+"\" (AppFolio) — new leases, renewals, inquiries, and applications will show as 0.");
    const lr=parseDelim(prop.files.leasingSummary||prop.files.leasing||"");
    const lt=lr.find(r=>/^total/i.test(r["Unit Type"]||""));
    if(lt){newLeases=parseInt(lt["Leased"]||0)||0;inquiries=parseInt(lt["Inquiries Received"]||0)||0;applications=parseInt(lt["Applications Received"]||0)||0;}
    else{lr.forEach(r=>{newLeases+=parseInt(r["Leased"]||0)||0;inquiries+=parseInt(r["Inquiries Received"]||0)||0;applications+=parseInt(r["Applications Received"]||0)||0;});}
    const rt=prop.files.renewalSummary||"";
    const rm=rt.match(/Total\s+(\d+)\s+Offers/i);
    if(rm)renewals=parseInt(rm[1])||0;else renewals=parseDelim(rt).filter(r=>/renewed/i.test(r["Status"]||"")).length;
  } else {
    occ1=calcOcc(prop.files.rr1,"rr1"); occ2=calcOcc(prop.files.rr2,"rr2"); occ3=calcOcc(prop.files.rr3,"rr3");
    const fr=parseDelim(skipMetaRows(prop.files.rr3||"")).filter(isBuildiumUnitRow);
    fr.forEach(r=>{if(!getVacantFlag(r)){mkt+=parseCur(r["MarketRent"]||r["Market Rent"]||0);act+=parseCur(r["Rent"]||0);}});
    if(!prop.files.delinquency) showError("Warning: Delinquency file missing for \""+prop.name+"\" — delinquency will show $0.");
    delinquency=parseBuildiumDelinquency(prop.files.delinquency||"");
    const lr=parseDelim(prop.files.leasing||"");
    const _qmInv=state.currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
    if(!_qmInv){showError("Warning: Quarter format not recognised (\""+state.currentQuarter+"\") for \""+prop.name+"\" — leasing date filter skipped. New leases and renewals will show as 0. Use format Q1 2025.");}
    lr.forEach(r=>{
      const d=parseDate(r["StartDate"]||r["DateActivated"]||r["Start Date"]||r["Date activated"]||r["Start date"]||"");
      const qm=state.currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
      if(!qm){return;} // skip row if quarter unrecognised — prevents sentinel-date false matches
      const qS=new Date(parseInt(qm[2]),([0,3,6,9])[parseInt(qm[1])-1],1);
      // qE is end-of-day on the last day of the quarter so a lease dated on
      // that day (e.g. Mar 31 with any time component) is still counted.
      const qE=new Date(parseInt(qm[2]),([3,6,9,12])[parseInt(qm[1])-1],0,23,59,59,999);
      if(d&&d>=qS&&d<=qE){const lType=(r["Lease type"]||r["Lease Type"]||"").trim();if(lType){if(/renewal/i.test(lType))renewals++;else if(/new/i.test(lType))newLeases++;}else{const ir=String(r["IsRenewal"]||r["Is Renewal"]||"0").toLowerCase();if(["0","false","no"].includes(ir))newLeases++;if(["1","true","yes"].includes(ir))renewals++;}}
    });
    if(prop.files.rentEngine){
      const pp=parseDelim(prop.files.rentEngine||"").filter(r=>communityMatches(r["Community Name"], prop.name));
      if(pp.length===0) showError("Warning: Rent Engine file uploaded but no rows matched \""+prop.name+"\" — inquiries/applications will be 0 for this property.");
      inquiries=pp.reduce((s,r)=>s+(parseInt(r["Leads"])||0),0);
      applications=pp.reduce((s,r)=>s+(parseInt(r["Apps Submitted"])||0),0);
    }
  }

    : parseDelim(skipMetaRows(prop.files.rr3||"")).filter(isBuildiumUnitRow).length;

// Builds the per-unit current rent map from property rent rolls.
// Works for both directly-uploaded files and ↑ Imported properties
// (falls back to the source single-property save's files for imports).
// Called by processInvestmentData() and auto-triggered by the Business Plan
// section when the map is empty but invMetrics already exist.
function _buildUnitCurrentRents(){
  const map={};
  const fileKeys=Object.keys(_dbCache).filter(k=>k.startsWith('lw_files_'));
  console.log('[LW Debug] lw_files_ keys in cache:',fileKeys);
  for(const prop of (state.invProperties||[])){
    let rr3Text=(prop.files&&prop.files.rr3)||null;
    if(!rr3Text && prop._imported && prop._importedFrom){
      try{
        const sf=loadFilesForKey(prop._importedFrom);
        console.log('[LW Debug] prop "'+prop.name+'" importedFrom="'+prop._importedFrom+'" loadFilesForKey result:',sf?Object.keys(sf):'null');
        if(sf&&sf.rr3)rr3Text=sf.rr3;
      }catch(e){console.warn('[LW Debug] loadFilesForKey error:',e);}
    }
    if(!rr3Text){console.log('[LW Debug] prop "'+prop.name+'" — no rr3, skipping');continue;}
    try{
      const isBd=prop.source==='buildium';
      const rows=isBd
        ? parseDelim(skipMetaRows(rr3Text)).filter(isBuildiumUnitRow)
        : parseDelim(rr3Text).filter(r=>{const u=String(r["Unit"]||"").trim();return u&&!/^\d+\s*units?$/i.test(u)&&!/^total/i.test(u)&&!/^->/.test(u);});
      rows.forEach(r=>{
        if(!getVacantFlag(r)){
          const rv=parseCur(r["Rent"]||r["Monthly Rent"]||r["Actual Rent"]||r["ActualRent"]||0);
          const normU=normUnitKey(String(r["Unit"]||"").trim());
          if(normU&&rv>0) map[normU]=rv;
        }
      });
    }catch(_){}
  }
  return map;
}

function processInvestmentData(opts){
  try{
    showError("");
    const results=[];
    const propErrors=[];
    const currentQ=(state.currentQuarter||"").trim().toLowerCase();
    // Skip properties that aren't workable (no imported metrics AND no source
    // AND no files). Including them would just produce all-zero rows and
    // dilute averages.
    const _isWorkable = p =>
      (p._imported && p.metrics) ||
      (!!p.source && Object.keys(p.files||{}).some(k => p.files[k]));
    for(const prop of state.invProperties){
      if(!_isWorkable(prop)) continue;
      try{
        if(prop._imported && prop.metrics){
          // Warn if the imported metrics came from a save whose quarter doesn't match current
          if(prop._importedFrom && currentQ){
            const importedQ=(prop._importedFrom||"").replace(/^[^_]*_/,"").replace(/_/g," ").trim();
            const normImported=importedQ.toLowerCase();
            if(normImported && !normImported.includes(currentQ) && !currentQ.includes(normImported)){
              propErrors.push("\""+prop.name+"\": imported metrics may be from a different quarter ("+importedQ+") — verify or re-import");
            }
          }
          results.push(prop.metrics);
        }
        else{ prop.metrics=parsePropertyMetrics(prop); results.push(prop.metrics); }
      }
      catch(e){ propErrors.push("\""+prop.name+"\": "+e.message); prop.metrics=null; }
    }
    if(propErrors.length) showError("Warning: "+propErrors.length+" propert"+(propErrors.length>1?"ies":"y")+" skipped due to errors — "+propErrors.join("; "));
    if(!results.length){showError("Error: No properties could be processed. Check your uploaded files.");return;}
    // Warn if any property has no unit count — user can re-save single-property report or enter units in Asset Facts
    const missingUnits=results.filter(m=>!m.unitCount).map(m=>m.name||"unnamed");
    if(missingUnits.length) showError("Warning: Unit count missing for "+missingUnits.join(", ")+" — open each single-property report, enter '# of Units' in Asset Facts, and re-save. Total Units will show '—' until corrected.");
    const totalIncome=results.reduce((s,m)=>s+m.totalIncome,0);
    const totalExpense=results.reduce((s,m)=>s+m.totalExpense,0);
    const noi=results.reduce((s,m)=>s+m.noi,0);
    const delinquency=results.reduce((s,m)=>s+m.delinquency,0);
    const newLeases=results.reduce((s,m)=>s+(m.newLeases||0),0);
    const renewals=results.reduce((s,m)=>s+(m.renewals||0),0);
    const inquiries=results.reduce((s,m)=>s+(m.inquiries||0),0);
    const applications=results.reduce((s,m)=>s+(m.applications||0),0);
    const lossToLease=results.reduce((s,m)=>s+(m.lossToLease||0),0);
    // Unit-weighted occupancy: weight each property's occupancy by its unit count
    const totalUnitsPortfolio=results.reduce((s,m)=>s+(m.unitCount||0),0);
    const occupancy=totalUnitsPortfolio>0
      ? Math.round(results.reduce((s,m)=>s+(m.occupancy*(m.unitCount||0)),0)/totalUnitsPortfolio)
      : (results.length>0?Math.round(results.reduce((s,m)=>s+m.occupancy,0)/results.length):0);
    const econOccs=results.filter(m=>m.avgEconOcc).map(m=>parseFloat(m.avgEconOcc));
    const avgEconOcc=econOccs.length>0?Math.round(econOccs.reduce((s,v)=>s+v,0)/econOccs.length).toString():null;
    // Roll up expenseCategories across all properties so rewriteWithClaude('investment')
    // can name the 1-3 categories driving the portfolio expense change. Without this
    // roll-up, state.invMetrics.expenseCategories is undefined and Claude has no
    // category detail to work with.
    const _invExpCatMap={};
    results.forEach(m=>(m.expenseCategories||[]).forEach(c=>{
      const k=(c.name||"").trim();
      if(!k) return;
      _invExpCatMap[k]=(_invExpCatMap[k]||0)+(c.amount||0);
    }));
    const portfolioExpenseCats=Object.entries(_invExpCatMap)
      .map(([name,amount])=>({name,amount}))
      .sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
    // MWP 5 supplemental income — SFH and LOC amounts added quietly to portfolio totals
    let _totalIncome=totalIncome, _totalExpense=totalExpense, _noi=noi;
    if(/mwp\s*5/i.test(state.investmentName||'') && state.suppIncome) {
      const sfhInc = parseCur(state.suppIncome.sfhIncome)||0;
      const sfhExp = parseCur(state.suppIncome.sfhExpenses)||0;
      const locInc = parseCur(state.suppIncome.locIncome)||0;
      _totalIncome += sfhInc + locInc;
      _totalExpense += sfhExp;
      _noi += (sfhInc - sfhExp) + locInc;
    }
    const totalCapex=results.reduce((s,m)=>s+(m.capex||0),0);
    const unitCurrentRents=_buildUnitCurrentRents();
    state.invMetrics={totalIncome:_totalIncome,totalExpense:_totalExpense,noi:_noi,capex:totalCapex,delinquency,newLeases,renewals,inquiries,applications,lossToLease,occupancy,avgEconOcc,propertyCount:results.length,totalUnits:totalUnitsPortfolio,propertyMetrics:results,expenseCategories:portfolioExpenseCats,unitCurrentRents};
    // Auto-fill Business Plan Units Remaining now that we know totalUnits
    // (handles the case where the CapEx file was imported before the report was processed)
    if(state.businessPlan&&state.businessPlan.unitsCompleted&&totalUnitsPortfolio>0){
      const rc=parseInt(state.businessPlan.unitsCompleted)||0;
      if(rc>0&&!state.businessPlan.unitsRemaining) state.businessPlan.unitsRemaining=String(Math.max(0,totalUnitsPortfolio-rc));
    }
    // Only regenerate narratives if the user has NOT edited them. The
    // `invNarrativesEdited` flag is set by the textarea oninput handler;
    // for legacy saves that predate the flag we fall back to a content check.
    if(!narrativesEditedFlag('inv') && !hasNarrativeContent(state.invNarratives)){
      state.invNarratives=genInvestmentNarratives(state.invMetrics);
    } else {
      showToast("✓ Processed — your edited narratives preserved");
    }
    if(!(opts&&opts.stayOnStep)){state.step=1;}
    state._savedThisStep=false; render();
  }catch(e){showError("Error: "+e.message);}
}
function genInvestmentNarratives(m){
  const q=state.currentQuarter||"";
  const n=state.invProperties.length;
  const prev=state.invPrevMetrics;
  const incChg=(prev&&Math.abs(prev.totalIncome)>0)?((m.totalIncome-prev.totalIncome)/Math.abs(prev.totalIncome)*100):null;
  const expChg=(prev&&Math.abs(prev.totalExpense)>0)?((m.totalExpense-prev.totalExpense)/Math.abs(prev.totalExpense)*100):null;
  // Build per-property breakdowns using actual property names
  const pm=(m.propertyMetrics||[]).filter(p=>p.name);
  const propIncomeDetail=pm.length>1
    ? " "+pm.map(p=>`${p.name} contributed ${fmtWhole(p.totalIncome)} with NOI of ${fmtWhole(p.noi)} and ${p.occupancy}% occupancy`).join("; ")+"."
    : "";
  const propExpenseDetail=pm.length>1
    ? " "+pm.map(p=>`${p.name} recorded total expenses of ${fmtWhole(p.totalExpense)}`).join("; ")+"."
    : "";
  return{
    income:`Total income across the ${n}-property portfolio for ${q} was ${fmtWhole(m.totalIncome)}, with a net operating income of ${fmtWhole(m.noi)}.${incChg!==null?` Income ${incChg>=0?"increased":"decreased"} ${Math.abs(incChg).toFixed(0)}% quarter over quarter.`:""} Weighted average physical occupancy stood at ${m.occupancy}%.${propIncomeDetail}`,
    expenses:`Total operating expenses for the portfolio were ${fmtWhole(m.totalExpense)} for ${q}.${expChg!==null?` Expenses ${expChg>=0?"increased":"decreased"} ${Math.abs(expChg).toFixed(0)}% quarter over quarter.`:""} The portfolio maintained disciplined cost management across all ${n} properties.${propExpenseDetail}`,
    capex:(()=>{const pm=(m.propertyMetrics||[]).filter(p=>p.capex>0||((p.capexItems||[]).length>0));if(!pm.length) return"";return pm.map(p=>{const items=(p.capexItems||[]).slice(0,3).map(i=>i.name).join(", ");return`${p.name} recorded ${fmtWhole(p.capex)} in capital expenditures${items?` including ${items}`:""}.`;}).join(" ");})(),
    outlook:`The ${state.investmentName||"portfolio"} enters ${nextQtr(q)} with ${m.occupancy>=90?"strong":"stable"} occupancy at ${m.occupancy}% weighted average, supported by ${m.newLeases} new leases and ${m.renewals} renewals secured during ${q}.`
  };
}
function genBpNarrative(){
  const bp=state.businessPlan||{};
  const q=state.currentQuarter||"this quarter";
  const inv=state.investmentName||"the portfolio";
  const comp=parseInt(bp.unitsCompleted)||0;
  const rem=parseInt(bp.unitsRemaining)||0;
  const total=comp+rem;
  const unitsPct=total>0?Math.min(100,Math.round(comp/total*100)):0;
  const budget=parseFloat(String(bp.totalBudget||"0").replace(/[$,]/g,""))||0;
  const spent=parseFloat(String(bp.spentToDate||"0").replace(/[$,]/g,""))||0;
  const budgetPct=budget>0?Math.min(100,Math.round(spent/budget*100)):0;
  const remaining=budget>0?budget-spent:0;
  const remodels=(bp.bpCapexParsed&&bp.bpCapexParsed.remodels)||[];
  const avgCost=remodels.length>0?Math.round(remodels.reduce((s,u)=>s+u.totalCost,0)/remodels.length):0;
  // Rent narrative always uses portfolio-wide averages (all occupied units), consistent with the report visual.
  const launch=parseFloat(String(bp.launchRentPerUnit||"0").replace(/[$,]/g,""))||0;
  const _pm=(state.invMetrics&&state.invMetrics.propertyMetrics)||[];
  const _totalRent=_pm.reduce((s,p)=>s+(p.monthlyRent||0),0);
  const _totalOcc=_pm.reduce((s,p)=>s+Math.round(((p.unitCount||0)*(p.occupancy||0)/100)),0);
  const curRentPerUnit=_totalOcc>0?Math.round(_totalRent/_totalOcc):0;
  const rentDelta=launch>0&&curRentPerUnit>0?curRentPerUnit-launch:null;
  const rentDeltaPct=rentDelta!==null&&launch>0?Math.round(rentDelta/launch*100):null;

  // Progress sentence
  let progressSentence="";
  if(comp>0&&total>0){
    progressSentence=`As of ${q}, ${comp} of ${total} planned unit${total!==1?"s have":" has"} been remodeled, representing ${unitsPct}% completion of the renovation program at ${inv}.`;
  } else if(comp>0){
    progressSentence=`As of ${q}, ${comp} unit${comp!==1?"s have":" has"} been remodeled at ${inv}.`;
  }

  // Budget sentence
  let budgetSentence="";
  if(spent>0&&budget>0){
    const delta=budgetPct-unitsPct;
    const alignment=Math.abs(delta)<=5
      ?"tracking closely with unit completion"
      :delta>5
        ?`running ${delta} percentage points ahead of unit completion`
        :`running ${Math.abs(delta)} percentage points behind unit completion`;
    budgetSentence=` Total renovation spend stands at $${spent.toLocaleString()} (${budgetPct}% of the $${budget.toLocaleString()} budget), ${alignment}.${remaining>0?` Approximately $${remaining.toLocaleString()} remains available for the ${rem} unit${rem!==1?"s":""} still to be renovated.`:""}`;
  } else if(spent>0){
    budgetSentence=` Total renovation spend to date is $${spent.toLocaleString()}.`;
  }

  // Per-unit cost sentence
  let costSentence="";
  if(avgCost>0){
    costSentence=` The average all-in cost per remodeled unit is $${avgCost.toLocaleString()}.`;
  }

  // Rent growth sentence — portfolio-wide comparison
  let rentSentence="";
  if(rentDelta!==null&&rentDeltaPct!==null){
    if(rentDelta>0){
      rentSentence=` The renovation program has supported meaningful rent growth — average occupied rent has increased ${rentDeltaPct}% from the $${launch.toLocaleString()} per unit launch target to $${curRentPerUnit.toLocaleString()} currently.`;
    } else if(rentDelta<0){
      rentSentence=` Average occupied rent of $${curRentPerUnit.toLocaleString()} per unit remains below the $${launch.toLocaleString()} per unit launch target, reflecting the early stage of the renovation program.`;
    } else {
      rentSentence=` Average occupied rent of $${curRentPerUnit.toLocaleString()} per unit is in line with the launch target.`;
    }
  }

  // Remodel ROI sentence — uses same per-unit calculation as the ROI tiles
  let roiSentence="";
  if(remodels.length>0){
    const launchRents=(bp.bpLaunchRentParsed&&bp.bpLaunchRentParsed.unitRents)||{};
    const overrides=bp.bpLaunchRentOverrides||{};
    const currentRents=(bp.bpCurrentRentParsed&&bp.bpCurrentRentParsed.unitRents)||(state.invMetrics&&state.invMetrics.unitCurrentRents)||{};
    let totalUplift=0,roiUnits=0;
    remodels.forEach(u=>{
      const nk=normUnitKey(u.unit);
      const lr=launchRents[nk]||overrides[nk]||0;
      const cr=currentRents[nk]||0;
      if(lr>0&&cr>0){totalUplift+=(cr-lr);roiUnits++;}
    });
    if(roiUnits>0){
      const remodelsTotal=Math.round(remodels.reduce((s,u)=>s+u.totalCost,0));
      const monthlyUplift=Math.round(totalUplift/roiUnits);
      const annualUplift=Math.round(monthlyUplift*12*roiUnits);
      const roi=remodelsTotal>0?Math.round(annualUplift/remodelsTotal*100*10)/10:null;
      if(monthlyUplift>0){
        roiSentence=` Across the ${roiUnits} remodeled unit${roiUnits!==1?"s":""} with confirmed current rents, the average monthly rent uplift is $${monthlyUplift.toLocaleString()} per unit, generating $${annualUplift.toLocaleString()} in incremental annual rent${roi!==null?` and a ${roi}% return on remodel spend`:""}.`;
      }
    }
  }

  // Outlook sentence
  let outlookSentence="";
  if(rem>0){
    outlookSentence=` The team will continue executing renovations on the remaining ${rem} unit${rem!==1?"s":""}, with the goal of driving further rent growth and value creation across the portfolio.`;
  } else if(comp>0&&rem===0){
    outlookSentence=` With all planned renovations complete, the focus shifts to stabilizing occupancy at post-renovation rent levels and maximizing the return on invested capital.`;
  }

  return (progressSentence+budgetSentence+costSentence+rentSentence+roiSentence+outlookSentence).trim();
}
