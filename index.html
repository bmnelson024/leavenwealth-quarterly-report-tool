          <button style="font-size:11px;font-weight:600;color:white;background:#1a3a35;border:1px solid #1a3a35;border-radius:5px;padding:5px 11px;cursor:${state.rewritingClaude?'not-allowed':'pointer'};white-space:nowrap;font-family:Inter,sans-serif;opacity:${state.rewritingClaude?'0.7':'1'}" onclick="rewriteWithClaude('single')" ${state.rewritingClaude?'disabled':''} title="Rewrite the four narratives with Claude Sonnet 4.6 (uses the same metrics; produces varied prose)">${state.rewritingClaude?'✨ Writing...':'✨ Rewrite with Claude'}</button>
          <button style="font-size:11px;font-weight:600;color:#2e7d6e;background:#e6f9f4;border:1px solid #c8e6de;border-radius:5px;padding:5px 11px;cursor:pointer;white-space:nowrap;font-family:Inter,sans-serif" onclick="if(confirm('Overwrite current narratives with freshly generated text?')){state.narratives=genNarratives(state.metrics);render()}" title="Re-run template narrative generator">↺ Template</button>
        </div>
      </div>
      ${[["income","Income & Occupancy"],["expenses","Expenses"],["capex","Capital Expenditures"],["outlook","Outlook"]].map(([k,l])=>`
        <div>
          <span class="narrative-label">${l}<span class="auto-badge">AUTO</span></span>
          <textarea id="narr-${k}" oninput="state.narratives['${k}']=this.value;state.narrativesEdited=true">${escapeHtml(state.narratives[k])}</textarea>
        </div>`).join("")}
      <div class="charts-info">📊 <strong>${chartsN}/10 charts uploaded</strong> — ${chartsN===10?"All charts ready!":"Missing charts will show placeholders."}</div>
      <div class="btn-row">
        <button class="btn-back" onclick="state.step=1;render()">← Back</button>
        <button class="save-btn" onclick="saveProgress()">💾 Save</button>
        <button class="gen-btn btn-next" style="flex:2" ${state.generating?"disabled":""} onclick="confirmAndGenerate()">
          ${state.generating?`<span class="spinner"></span> Building Report...`:"🖨️ Generate Report"}
        </button>
      </div>`;
  }
  else if(state.step===2 && state.reportHTML){
    el.innerHTML=`
      <div class="report-ready-header">
        <div>
          <h2 style="font-size:16px;font-weight:600;margin:0">✅ Report Ready!</h2>
          <p style="font-size:12px;color:#9ca3af;margin:4px 0 0">Preview below — click Print to save as PDF.</p>
        </div>
        <div style="display:flex;gap:8px">
          ${getSavesIndex().length>0?`<button class="btn-home" onclick="state.showHome=true;render()">🏠 All Reports</button>`:""}
          <button class="btn-back" style="white-space:nowrap" onclick="state.reportHTML=null;render()">← Edit</button>
          <button class="save-btn" onclick="saveProgress()">💾 Save</button>
          <button class="btn-next" style="flex:none;padding:8px 16px;font-size:13px" onclick="printReport()">🖨️ Print / Save PDF</button>
        </div>
      </div>
      <div class="print-instructions">
        <strong>📄 To save as PDF:</strong> Click <strong>Print / Save PDF</strong> above → set Destination to <strong>Save as PDF</strong> → click Save.
      </div>
      <div style="width:100%;height:820px;border:1px solid #c8e6de;border-radius:8px;overflow:hidden;">
        <iframe id="preview-frame" srcdoc="" style="width:100%;height:100%;border:none;"></iframe>
      </div>
      <iframe id="print-frame" srcdoc="" style="position:fixed;top:-9999px;left:-9999px;width:816px;height:1056px;border:none;visibility:hidden;"></iframe>
      <div style="display:flex;gap:8px;margin-top:10px">
        ${getSavesIndex().length>0?`<button class="new-quarter-btn" style="background:white;color:#1a3a35;border:1.5px solid #c8e6de;margin-top:0" onclick="state.showHome=true;render()">🏠 All Reports</button>`:""}
        <button class="new-quarter-btn" style="margin-top:0" onclick="if(confirm('Start new quarter? Clears all data.')){resetAll()}">+ Start New Quarter</button>
      </div>`;
    setTimeout(()=>{
      const preview=document.getElementById("preview-frame");
      const printFr=document.getElementById("print-frame");
      if(preview) preview.srcdoc=state.reportHTML;
      if(printFr) printFr.srcdoc=state.reportHTML;
    },50);
  }
  // After every render, schedule an autosave. Debounced + gated by
  // canAutoSave() so bootstrap renders, home-screen renders, and renders
  // with incomplete metadata don't trigger spurious writes.
  scheduleAutoSave();
}
// Shared helper — returns "87" or null. Used by calcEconAvg and by report builders.
function _econAvgStr(eo){
  if(!eo) return null;
  const {m1,m2,m3}=eo;
  if(m1&&m2&&m3) return Math.round((parseFloat(m1)+parseFloat(m2)+parseFloat(m3))/3).toString();
  return null;
}
function calcEconAvg(){
  const s=_econAvgStr(state.econOcc);
  return s?("Average: "+s+"%"):"";
}
function resetAll(){
  state = _makeDefaultState();
  state.showHome = getSavesIndex().length > 0;
  render();
}
// ─── AUTH ─────────────────────────────────────────────────────────────────────
let _authMode = "signin"; // "signin" | "signup"
function _authMsg(txt, kind){
  const el = document.getElementById('auth-msg');
  if(!el) return;
  el.className = 'auth-msg ' + (kind || 'info');
  el.textContent = txt || '';
  if(!txt) el.style.display = 'none';
}
function authToggleMode(){
  _authMode = (_authMode === 'signin') ? 'signup' : 'signin';
  document.getElementById('auth-title').textContent = _authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('auth-submit').textContent = _authMode === 'signin' ? 'Sign in' : 'Sign up';
  document.getElementById('auth-toggle-text').textContent = _authMode === 'signin' ? 'Need an account?' : 'Already have one?';
  document.getElementById('auth-toggle-link').textContent = _authMode === 'signin' ? 'Sign up' : 'Sign in';
  document.getElementById('auth-password').setAttribute('autocomplete', _authMode === 'signin' ? 'current-password' : 'new-password');
  _authMsg('', 'info');
}
async function authSubmit(){
  const email = (document.getElementById('auth-email').value||'').trim().toLowerCase();
  const pw    = document.getElementById('auth-password').value || '';
  if(!email || !pw){ _authMsg('Enter your email and password.','error'); return; }
  if(!email.endsWith('@'+EMAIL_DOMAIN)){
    _authMsg('Access is restricted to @'+EMAIL_DOMAIN+' email addresses.','error');
    return;
  }
  if(_authMode === 'signup' && pw.length < 8){
    _authMsg('Password must be at least 8 characters.','error');
    return;
  }
  const btn = document.getElementById('auth-submit');
  btn.disabled = true;
  btn.textContent = _authMode === 'signin' ? 'Signing in…' : 'Creating account…';
  try{
    if(_authMode === 'signin'){
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if(error) throw error;
      await _bootAfterAuth(data.user);
    } else {
      const { data, error } = await sb.auth.signUp({ email, password: pw });
      if(error) throw error;
      if(data.user && data.session){
        await _bootAfterAuth(data.user);
      } else {
        // Flip back to sign-in mode (toggle-aware) so every label stays consistent,
        // then restore the "Account created" message which authToggleMode clears.
        if(_authMode === 'signup') authToggleMode();
        _authMsg('Account created. Check your inbox to confirm your email, then sign in.','ok');
      }
    }
  }catch(e){
    _authMsg(e && e.message ? e.message : 'Authentication failed.', 'error');
  }finally{
    btn.disabled = false;
    if(_authMode==='signup') btn.textContent='Sign up'; else btn.textContent='Sign in';
  }
}
async function authForgotPassword(){
  const email = (document.getElementById('auth-email').value||'').trim().toLowerCase();
  if(!email){ _authMsg('Enter your email above first, then click Forgot password.','info'); return; }
  try{
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
    if(error) throw error;
    _authMsg('Password reset link sent to '+email+'.','ok');
  }catch(e){
    _authMsg(e && e.message ? e.message : 'Could not send reset email.','error');
  }
}
async function authSignOut(){
  try{ await sb.auth.signOut(); }catch(e){ console.warn('signOut failed:',e); }
  // Belt-and-suspenders: empty the autosave dedup cache so if a different
  // user signs in on this browser before the reload completes, their
  // file fingerprints don't collide with the previous user's cached ones.
  // The reload below replaces JS scope entirely so this is mostly defensive.
  for(const k of Object.keys(_lastFilesHashByKey)) delete _lastFilesHashByKey[k];
  // Hard reload so all in-memory state is cleared cleanly.
  window.location.reload();
}
async function _bootAfterAuth(user){
  // Defense-in-depth: even though authSubmit's client-side check rejects
  // non-@leavenwealth.com addresses and the narratives Edge Function enforces
  // the same rule server-side, a session that somehow made it here with the
  // wrong domain is immediately signed out. The real backstop is a Row Level
  // Security policy on qr_store that requires an @leavenwealth.com email —
  // verify that policy is in place in the Supabase dashboard.
  if(!user || !user.email || !user.email.toLowerCase().endsWith('@'+EMAIL_DOMAIN)){
    try{ await sb.auth.signOut(); }catch(e){ /* best-effort */ }
    _authMsg('Access is restricted to @'+EMAIL_DOMAIN+' email addresses.','error');
    return;
  }
  _currentUser = user;
  _authMsg('Loading your data…','info');
  try{
    await supaBootstrap();
    cleanupGarbageDbKeys(); // remove short-name photo/facts keys from prior buggy sessions
  }catch(e){
    _authMsg('Could not load data: ' + (e && e.message || e) + '. You can still use the app, but saves may not persist.', 'error');
    console.error(e);
  }
  // Show the user chip in the header
  const chip = document.getElementById('user-chip');
  const chipEmail = document.getElementById('user-chip-email');
  if(chip && chipEmail){
    chipEmail.textContent = user.email || '';
    chip.style.display = 'flex';
  }
  // Hide auth overlay, reveal app
  const overlay = document.getElementById('auth-overlay');
  if(overlay) overlay.style.display = 'none';
  const appRoot = document.getElementById('app-root');
  if(appRoot) appRoot.classList.add('ready');
  // First render
  state.showHome = getSavesIndex().length > 0;
  try{ render(); }catch(e){ console.warn('Bootstrap render failed:',e); }
}
// ─── STARTUP ──────────────────────────────────────────────────────────────────
// Set header/auth-card logos as soon as the DOM is ready so the login screen
// looks branded even before auth resolves.
(function(){
  const headerLogo = document.getElementById('lw-header-logo');
  if(headerLogo) headerLogo.src = LOGO_SYMBOL;
  const authLogo = document.getElementById('auth-logo');
  if(authLogo) authLogo.src = LOGO_FULL;
  // Allow Enter key to submit the login form
  ['auth-email','auth-password'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){
      el.addEventListener('keydown', ev=>{
        if(ev.key === 'Enter'){ ev.preventDefault(); authSubmit(); }
      });
    }
  });
  // ── Autosave wiring ─────────────────────────────────────────────────────
  // Delegated listeners on #step-content catch every typed / changed input
  // on the upload and review screens without having to touch each handler.
  // armAutoSave() flips the "user has interacted" flag so initial bootstrap
  // renders don't fire a save before the user has actually done anything.
  const _onUserInput = (e) => {
    const t = e.target;
    if(!t || !t.closest) return;
    if(t.closest('#step-content') || t.closest('.save-modal')) {
      armAutoSave();
      scheduleAutoSave();
    }
  };
  document.addEventListener('input', _onUserInput, true);
  document.addEventListener('change', _onUserInput, true);
  // Click delegation: upload buttons spawn dynamic file inputs outside
  // #step-content, so their change events don't bubble through our delegation.
  // Arming on click here covers that flow — loadFile's async callback will
  // trigger a render after the file loads, which then fires scheduleAutoSave.
  document.addEventListener('click', (e) => {
    const t = e.target;
    if(!t || !t.closest) return;
    if(t.closest('#step-content')) armAutoSave();
  }, true);
  // Best-effort flush on tab close / navigation — runs any pending debounced save.
  window.addEventListener('beforeunload', flushAutoSaveOnUnload);
})();
// Check for an existing session and auto-sign-in, or leave the login screen up.
(async function bootstrap(){
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(session && session.user){
      await _bootAfterAuth(session.user);
    }
  }catch(e){
    console.warn('Session check failed:',e);
    _authMsg('Could not contact Supabase. Check your internet connection and reload.', 'error');
  }
})();
// React to sign-in / sign-out from other tabs (same Supabase project).
sb.auth.onAuthStateChange((event, session)=>{
  if(event === 'SIGNED_OUT'){
    window.location.reload();
  }
});
</script>
